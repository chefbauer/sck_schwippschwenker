; DS18B20 → I²C-Bridge  (ESP32-C3, ESP-IDF 5.x)
; ─────────────────────────────────────────────
; VS Code + PlatformIO: diesen Ordner als Workspace öffnen
;   File → Open Folder → 1w_i2c_bridge/
;
; Erster Build lädt onewire_bus + ds18b20 automatisch via
; ESP-IDF Component Manager (idf_component.yml).

[env:esp32c3]
platform  = espressif32
board     = esp32-c3-devkitm-1
framework = espidf

monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, colorize
