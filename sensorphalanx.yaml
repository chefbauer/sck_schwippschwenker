  # ── SHT4x – Temperatur und Luftfeuchtigkeit ───────────────
  - platform: sht4x
    i2c_id: i2c_bus
    update_interval: 1s
    temperature:
      id: sensor_sht4x_temp
      name: "Temperature"
      on_value:
        then:
          - lvgl.widget.refresh: temp_value_label
          - lvgl.widget.refresh: lbl_statusbar_temp
    humidity:
      id: sensor_sht4x_humi
      name: "Relative Humidity"
      on_value:
        then:
          - lvgl.widget.refresh: hum_value_label

  # ── BMP581 – Barometrischer Druck und Temperatur ──────────
  - platform: bmp581_i2c
    i2c_id: i2c_bus
    update_interval: 1s
    temperature:
      name: "Indoor Temperature"
      id: bmp_temperature
    pressure:
      name: "Indoor Pressure"
      id: bmp_pressure
      accuracy_decimals: 1
      filters:
        - lambda: return x/100;
      on_value:
        then:
          - lvgl.widget.refresh: pressure_value_label

  # ── Berechnete Höhe aus BMP581 (hypsometrische Formel) ────
  - platform: template
    name: "Indoor Altitude"
    id: indoor_altitude
    unit_of_measurement: "m"
    icon: "mdi:image-filter-hdr"
    device_class: distance
    accuracy_decimals: 2
    state_class: measurement
    update_interval: 1s
    on_value:
      then:
        - lvgl.widget.refresh: height_value_label
    lambda: !lambda |-
      static const float P0         = 1013.25f;   // Standard-Referenzdruck [hPa]
      static const float lapse_rate = 0.0065f;    // K/m
      static const float exp_val    = 0.19023f;   // ≈ 1/5.255

      float p_hPa  = id(bmp_pressure).state;
      float temp_c = id(bmp_temperature).state;

      if (isnan(p_hPa) || p_hPa <= 300.0f || isnan(temp_c)) {
        return NAN;
      }

      float temp_k = temp_c + 273.15f;
      float ratio  = P0 / p_hPa;
      float altitude = (temp_k / lapse_rate) * (powf(ratio, exp_val) - 1.0f);

      if (altitude < -200.0f || altitude > 4000.0f) {
        return NAN;
      }
      return altitude;

  # ── VEML7700 – Umgebungslichtsensor ───────────────────────
  - platform: veml7700
    id: sensor_veml7700
    i2c_id: i2c_bus
    address: 0x10
    update_interval: 2s
    ambient_light:
      id: sensor_veml7700_lux
      name: "Ambient light"
      on_value:
        then:
          - lvgl.widget.refresh: light_value_label
          - lambda: |-
              if (id(brightness_auto_mode)) {
                // 0 lux → 50%, 100 lux → 100%, darüber gedeckelt
                float pct_f = x * 0.5f + 50.0f;
                if (pct_f > 100.0f) pct_f = 100.0f;
                if (pct_f < 50.0f)  pct_f = 50.0f;
                // Auf 5%-Raster runden → verhindert Dauerschwanken
                int pct = (int)(pct_f / 5.0f + 0.5f) * 5;
                int current = lv_slider_get_value(id(slider_helligkeit));
                if (abs(pct - current) < 5) return;  // < 5% Änderung ignorieren
                id(brightness_auto_updating) = true;
                lv_slider_set_value(id(slider_helligkeit), pct, LV_ANIM_OFF);
                id(brightness_auto_updating) = false;
                auto call = id(light_screen_background).make_call();
                call.set_brightness(pct / 100.0f);
                call.perform();
              }

  # ── MLX90632 – IR-Objekttemperatur (berechnete Ableitung) ─
  - platform: template
    id: sensor_Temp_OBJECT
    name: sensor_Temp_OBJECT
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    update_interval: 1s
    on_value:
      then:
        - lvgl.widget.refresh: mlx_value_label
    lambda: |-
      static bool setup_mode = true;
      uint8_t buf[2];
      uint8_t new_buf[2];
      uint16_t control = 0;
      uint16_t new_control = 0;
      constexpr uint16_t REG_CONTROL = 0x3001;

      if (setup_mode) {
        ESP_LOGI("mlx", "Erster Aufruf: Sensor-Setup wird durchgeführt...");
        setup_mode = false;

        // Vorher lesen + Bits loggen
        if (id(i2c_mlx90632).read_register16(REG_CONTROL, buf, 2) == i2c::ERROR_OK) {
            control = (buf[0] << 8) | buf[1];
        }

        // Neuer Wert: nur Bits 1,2 und 4-8 ändern
        new_control = control;
        new_control |= (0x3 << 1);    // Bits 1-2 = 11  // Continous
        new_control |= (0x11 << 4);    // Bits 8:4 = 10001 (meas_select = 0x11)

        new_buf[0] = static_cast<uint8_t>(new_control >> 8);
        new_buf[1] = static_cast<uint8_t>(new_control & 0xFF);

        if (id(i2c_mlx90632).write_register16(REG_CONTROL, new_buf, 2) == i2c::ERROR_OK) {
            ESP_LOGI("mlx_button", "REG_CONTROL geschrieben: 0x%04X", new_control);
        }
        delay(500);
      }

      double emissivity = 0.90;

      static bool coeffs_read = false;
      static int32_t P_R_raw = 0, P_G_raw = 0, P_T_raw = 0, P_O_raw = 0;
      static int32_t Ea_raw = 0, Eb_raw = 0;
      static int32_t Fa_raw = 0, Fb_raw = 0, Ga_raw = 0;
      static int16_t EE_Gb = 0, EE_Ha = 0, EE_Hb = 0, EE_Ka = 0;

      static double P_R = 0.0, P_G = 0.0, P_T = 0.0, P_O = 0.0;
      static double Ea = 0.0, Eb = 0.0;
      static double Fa = 0.0, Fb = 0.0, Ga = 0.0;
      static double Gb = 0.0, Ka = 0.0, Ha = 0.0, Hb = 0.0;

      if (!coeffs_read) {
        ESP_LOGD("mlx", "Kalibrierkoeffizienten werden zum ersten Mal gelesen...");

        auto read32 = [&](uint16_t lsw_addr, int32_t& raw) {
          int16_t lsw = 0, msw = 0;
          if (id(i2c_mlx90632).read_register16(lsw_addr,     buf, 2) == i2c::ERROR_OK)
            lsw = (int16_t)((buf[0] << 8) | buf[1]);
          if (id(i2c_mlx90632).read_register16(lsw_addr + 1, buf, 2) == i2c::ERROR_OK)
            msw = (int16_t)((buf[0] << 8) | buf[1]);
          raw = ((int32_t)msw << 16) | (int32_t)(lsw & 0xFFFF);
        };

        read32(0x240C, P_R_raw); P_R = (double)P_R_raw * pow(2, -8);
        read32(0x240E, P_G_raw); P_G = (double)P_G_raw * pow(2, -20);
        read32(0x2410, P_T_raw); P_T = (double)P_T_raw * pow(2, -44);
        read32(0x2412, P_O_raw); P_O = (double)P_O_raw * pow(2, -8);

        read32(0x2424, Ea_raw); Ea = (double)Ea_raw * pow(2, -16);
        read32(0x2426, Eb_raw); Eb = (double)Eb_raw * pow(2, -8);
        read32(0x2428, Fa_raw); Fa = (double)Fa_raw * pow(2, -46);
        read32(0x242A, Fb_raw); Fb = (double)Fb_raw * pow(2, -36);
        read32(0x242C, Ga_raw); Ga = (double)Ga_raw * pow(2, -36);

        if (id(i2c_mlx90632).read_register16(0x242E, buf, 2) == i2c::ERROR_OK) EE_Gb = (int16_t)((buf[0] << 8) | buf[1]);
        if (id(i2c_mlx90632).read_register16(0x242F, buf, 2) == i2c::ERROR_OK) EE_Ka = (int16_t)((buf[0] << 8) | buf[1]);
        if (id(i2c_mlx90632).read_register16(0x2481, buf, 2) == i2c::ERROR_OK) EE_Ha = (int16_t)((buf[0] << 8) | buf[1]);
        if (id(i2c_mlx90632).read_register16(0x2482, buf, 2) == i2c::ERROR_OK) EE_Hb = (int16_t)((buf[0] << 8) | buf[1]);

        Gb = (double)EE_Gb * pow(2, -10);
        Ka = (double)EE_Ka * pow(2, -10);
        Ha = (double)EE_Ha * pow(2, -14);
        Hb = (double)EE_Hb * pow(2, -10);

        coeffs_read = true;
      }

      int16_t ram52 = 0, ram53 = 0, ram54 = 0, ram55 = 0;
      int16_t ram56 = 0, ram57 = 0, ram58 = 0, ram59 = 0;

      auto read_ram = [&](uint16_t addr, int16_t& val) {
        if (id(i2c_mlx90632).read_register16(addr, buf, 2) == i2c::ERROR_OK)
          val = (int16_t)((buf[0] << 8) | buf[1]);
      };

      read_ram(0x4033, ram52);
      read_ram(0x4034, ram53);
      read_ram(0x4035, ram54);
      read_ram(0x4036, ram55);
      read_ram(0x4037, ram56);
      read_ram(0x4038, ram57);
      read_ram(0x4039, ram58);
      read_ram(0x403A, ram59);

      int16_t ram_ambient = ram54;
      int16_t ram_ref     = ram57;

      double VRTA = (double)ram_ref + Gb * ((double)ram_ambient / 12.0);
      double AMB  = ((double)ram_ambient / 12.0) / VRTA * (double)pow(2, 19);

      double S    = ((double)ram52 - (double)ram53 - (double)ram55 + (double)ram56) / 2.0
                    + (double)ram58 + (double)ram59;
      double VRTO = (double)ram_ref + Ka * ((double)ram_ambient / 12.0);
      double STO  = ((S / 12.0) / VRTO) * (double)pow(2, 19);

      double Bsub        = AMB - P_R;
      double ambient_temp = Bsub / P_G + P_T * (Bsub * Bsub) + P_O;

      double TADUT = (AMB - Eb) / Ea + 25.0;
      double TAK   = TADUT + 273.15;
      double TAK4  = pow(TAK, 4);

      double TODUT = ambient_temp;
      double To    = 0.0;
      for (int iter = 0; iter < 5; iter++) {
        double denom = emissivity * Fa / 2.0 * Ha
                       * (1.0 + Ga * (TODUT - 25.0) + Fb * (TADUT - 25.0));
        To    = pow((STO / denom) + TAK4, 0.25) - 273.15 - Hb;
        TODUT = To;
      }

      ESP_LOGD("mlx", "Object: %.2f °C | Ambient: %.2f °C", To, ambient_temp);
      return To;


# MLX
button:
  - platform: template
    name: "MLX90632 Set 8Hz, Extended + Continuous"
    id: mlx_set_extended
    on_press:
      then:
        script.execute: script_mlx90632_set_mode_continous_extended_16hz

script:
    - id: script_mlx90632_set_mode_continous_extended_16hz
      then:
        - lambda: |-
            ESP_LOGI("mlx_button", "=== Setze Extended + Continuous ===");

            uint8_t buf[2];
            uint8_t new_buf[2];
            uint16_t control = 0;
            uint16_t new_control = 0;
            uint16_t status = 0;
            int32_t product_id = 0;
            int32_t device_id = 0;
            constexpr uint16_t REG_CONTROL = 0x3001;
            constexpr uint16_t REG_STATUS = 0x3FFF;
            constexpr uint16_t STAT_DATA_RDY = 1 << 0;
            
            static bool rate_set = false;

            // // Hilfsfunktion für 32-Bit-Read (LSW + MSW)
            // auto read32 = [&](uint16_t lsw_addr, int32_t& var) {
            //     int16_t lsw = 0, msw = 0;
            //     if (id(i2c_mlx90632).read_register16(lsw_addr, buf, 2) == i2c::ERROR_OK) {
            //     lsw = (int16_t)((buf[0] << 8) | buf[1]);
            //     } else {
            //     ESP_LOGE("mlx_info", "Fehler LSW 0x%04X", lsw_addr);
            //     }
            //     if (id(i2c_mlx90632).read_register16(lsw_addr + 1, buf, 2) == i2c::ERROR_OK) {
            //     msw = (int16_t)((buf[0] << 8) | buf[1]);
            //     } else {
            //     ESP_LOGE("mlx_info", "Fehler MSW 0x%04X", lsw_addr + 1);
            //     }
            //     var = ((int32_t)msw << 16) | (int32_t)(lsw & 0xFFFF);
            // };

            // ESP_LOGD("mlx", "Adafruit Addressed Reset (0x3005 = 0x0006) startet...");

            // // Exakt Adafruit: 4 Bytes schreiben (Adresse 0x3005 + Daten 0x0006)
            // uint8_t reset_cmd[4] = {0x30, 0x05, 0x00, 0x06};
            // esp_err_t err = id(i2c_mlx90632)->write(reset_cmd, 4);

            // 1. Addressed Reset (0x0006 an 0x3005) – sehr hilfreich gegen Sticky-States
            uint8_t reset_buf[2] = {0x00, 0x06};
            id(i2c_mlx90632).write_register16(0x3005U, reset_buf, 2);
            delay(180);  // Reset braucht etwas Zeit


            // Product ID (0x2400-0x2401)
            read32(0x2400, product_id);

            // Device ID / Variant (0x2402-0x2403)
            read32(0x2402, device_id);

            // Status-Register (0x3FFF)
            if (id(i2c_mlx90632).read_register16(0x3FFF, buf, 2) == i2c::ERROR_OK) {
                status = (buf[0] << 8) | buf[1];
            } else {
                ESP_LOGE("mlx_info", "Fehler Status-Register 0x3FFF");
            }
            // Control-Register (0x3001) – meas_select
            if (id(i2c_mlx90632).read_register16(0x3001, buf, 2) == i2c::ERROR_OK) {
                control = (buf[0] << 8) | buf[1];
            } else {
                ESP_LOGE("mlx_info", "Fehler Control-Register 0x3001");
            }

            // RATE AUSLESEN
            ESP_LOGD("mlx", "Prüfe & setze Refresh-Rate auf 16 Hz (nur einmal)");


            uint16_t meas1 = read16(0x24E1);
            uint16_t meas2 = read16(0x24E2);
            uint8_t rate1 = (meas1 >> 8) & 0x07;
            uint8_t rate2 = (meas2 >> 8) & 0x07;
            float hz1 = 0.5 * (1 << rate1);
            float hz2 = 0.5 * (1 << rate2);
            ESP_LOGD("mlx", "Aktuell EE_MEAS_1: 0x%04X → %.1f Hz", meas1, hz1);
            ESP_LOGD("mlx", "Aktuell EE_MEAS_2: 0x%04X → %.1f Hz", meas2, hz2);

            if (rate1 == 0x05 && rate2 == 0x05) {
                ESP_LOGD("mlx", "Bereits 16 Hz eingestellt – kein Schreiben nötig");
                rate_set = true;
            }
            else
            {
                //////////////////////////////////
                // RATE 16Hz
                ESP_LOGD("mlx", "Rate nicht 16 Hz → Setze 16 Hz (nur relevante Bits ändern)");

                // Hilfsfunktion: Schreiben eines einzelnen EEPROM-Worts (mit Erase → Unlock → Write → Reset → Verify)
 


                // UMSTELLUNG STEP MODE
                if (id(i2c_mlx90632).read_register16(REG_CONTROL, buf, 2) == i2c::ERROR_OK) {
                    control = (buf[0] << 8) | buf[1];
                } else {
                    ESP_LOGE("mlx_button", "Vorher Read fehlgeschlagen");
                    return;
                }

                // Neuer Wert: nur Bits 1,2 und 4-8 ändern
                new_control = control;
                new_control &= ~(0x03 << 1); // Bits 1-2 löschen HALT MODE         
                // new_control |= (0x2 << 1);    // Bits 1-2 = 00  // STEP
                new_buf[0] = static_cast<uint8_t>(new_control >> 8);
                new_buf[1] = static_cast<uint8_t>(new_control & 0xFF);

                if (id(i2c_mlx90632).write_register16(REG_CONTROL, new_buf, 2) == i2c::ERROR_OK) {
                    ESP_LOGI("mlx_button", "REG_CONTROL geschrieben: 0x%04X", new_control);
                }
                delay(500);


                // // MEAS1: nur Bits 10:8 auf 4 setzen (8 Hz), Rest unverändert
                // uint16_t new_meas1 = meas1;
                // new_meas1 &= ~(0x07 << 8);   // Bits 10:8 löschen
                // new_meas1 |= (0x04 << 8);    // Bits 10:8 = 4 (8 Hz)

                // // MEAS2: nur Bits 10:8 auf 4 setzen, Rest unverändert
                // uint16_t new_meas2 = meas2;
                // new_meas2 &= ~(0x07 << 8);
                // new_meas2 |= (0x04 << 8);

                // uint8_t meas1_buf[2] = {
                //     static_cast<uint8_t>((new_meas1 >> 8) & 0xFF),  // MSB – oberes Byte zuerst
                //     static_cast<uint8_t>(new_meas1 & 0xFF)          // LSB – unteres Byte danach
                // };
                // uint8_t meas2_buf[2] = {
                //     static_cast<uint8_t>((new_meas2 >> 8) & 0xFF),  // MSB – oberes Byte zuerst
                //     static_cast<uint8_t>(new_meas2 & 0xFF)          // LSB – unteres Byte danach
                // };
                // delay(500);

                bool meas1_ok = mlx_safe_write_eeprom(0x24E1U, 0x850D, "MEAS1");
                delay(500);
                bool meas2_ok = mlx_safe_write_eeprom(0x24E2U, 0x851D, "MEAS2");

                if (meas1_ok && meas2_ok) {
                    ESP_LOGI("mlx", "Refresh-Rate erfolgreich auf 16 Hz gesetzt (beide Zellen)");
                    rate_set = true;

                    // Optional: nochmal 1–2 Sekunden warten und die tatsächliche Messrate prüfen
                    delay(1500);
                    // Hier könntest du z.B. 10 Messungen mit Zeitstempel machen, um ~125 ms Abstand zu sehen
                } else {
                    ESP_LOGE("mlx", "EEPROM-Programmierung fehlgeschlagen – Rate bleibt bei 2 Hz");
                }

                // Nachher lesen
                uint16_t verify_meas1 = read16(0x24E1);
                uint16_t verify_meas2 = read16(0x24E2);
                ESP_LOGD("mlx", "Nachher EE_MEAS1: 0x%04X", verify_meas1);
                ESP_LOGD("mlx", "Nachher EE_MEAS2: 0x%04X", verify_meas2);

                rate_set = true;
            }
            
            
            // Logging – bei jedem Update
            ESP_LOGI("mlx_info", "Product ID (0x2400-0x2401): 0x%08X (%ld)", (uint32_t)product_id, product_id);
            ESP_LOGI("mlx_info", "Device ID / Variant (0x2402-0x2403): 0x%08X (%ld)", (uint32_t)device_id, device_id);

            ESP_LOGI("mlx_info", "Status-Register (0x3FFF): 0x%04X", status);
            ESP_LOGD("mlx_info", "  DATA_RDY: %d", (status & 0x0800) >> 11);
            ESP_LOGD("mlx_info", "  EE_RDY: %d", (status & 0x0400) >> 10);
            ESP_LOGD("mlx_info", "  BROWN_OUT: %d", (status & 0x0200) >> 9);
            ESP_LOGD("mlx_info", "  CYCLE_MEAS: %d", (status & 0x0100) >> 8);

            ESP_LOGI("mlx_info", "Control-Register (0x3001): 0x%04X", control);
            uint8_t meas_select = (control >> 4) & 0x1F;
            ESP_LOGD("mlx_info", "  meas_select: 0x%02X", meas_select);
            ESP_LOGD("mlx_info", "  Continuous: %s", (meas_select & 0x10) ? "Ja" : "Nein");
            ESP_LOGD("mlx_info", "  Extended: %s", (meas_select & 0x01) ? "Ja" : "Nein");

            // Medical / Normal / Fake-Erkennung (typische Muster)
            if (product_id == 0x5A5A5A5A) {
                ESP_LOGI("mlx_info", "→ Erkannt: Echter Melexis MLX90632 (Product ID 0x5A5A5A5A)");
                if (meas_select == 0x11 || meas_select == 0x17) {
                ESP_LOGI("mlx_info", "→ Modus: Extended + Continuous → wahrscheinlich Medical-Version");
                } else {
                ESP_LOGI("mlx_info", "→ Modus: Normal / Standard");
                }
            } else if (product_id == 0) {
                ESP_LOGE("mlx_info", "→ WARNUNG: Product ID = 0 → Sensor antwortet nicht richtig (Fake / Defekt?)");
            } else {
                ESP_LOGW("mlx_info", "→ Unbekannte Product ID (0x%08X) – möglicher Fake oder Sonder-Variante", (uint32_t)product_id);
            }

            // Status-Register lesen und Bits loggen (am Start)
            if (id(i2c_mlx90632).read_register16(REG_STATUS, buf, 2) == i2c::ERROR_OK) {
                status = (buf[0] << 8) | buf[1];
                ESP_LOGD("mlx", "REG_STATUS (0x3FFF): 0x%04X", status);
                ESP_LOGD("mlx", "  DATA_RDY: %d", (status & STAT_DATA_RDY) != 0);

                // Clean Start: NEW_DATA-Bit (DATA_RDY) auf 0 setzen
                uint16_t new_status = status & ~STAT_DATA_RDY;

                new_buf[0] = static_cast<uint8_t>(new_status >> 8);
                new_buf[1] = static_cast<uint8_t>(new_status & 0xFF);
                 
