# ================================
# Sensor Phalanx – Hardware Konfiguration
# MLX90632 · VL53L1X · SHT4x · BMP581 · VEML7700
#
# Alle Sensoren teilen sich den gemeinsamen I²C-Bus
# der Hauptkonfiguration (main_config): "i2c_bus"
# ================================
# ── Komponenten ──────────────────────────────────────────────────────────────────
#  sensor:   distance_sensor, sensor_sht4x_temp, sensor_sht4x_humi,
#            bmp_temperature, bmp_pressure, indoor_altitude,
#            sensor_veml7700_lux, sensor_Temp_OBJECT
#  button:   mlx_set_extended
#  script:   script_mlx90632_set_mode_continous_extended_16hz
# ─────────────────────────────────────────────────────────────────────────────────

esphome:
  includes: 
      - includes/mlx_functions.h

#external_components:
#  #- source: github://mrtoy-me/esphome-vl53l1x
#  - source: github://chefbauer/esphome_vl53l4cd@vl53l1x
#    components: [vl53l1x]
#    refresh: 1s     #1d  # Optional: Täglich auf Updates prüfen

external_components:
  - source: github://chefbauer/esphome_vlx53l4cd
    components: [vl53l4cd]
    refresh: 1s     #1d  # Optional: Täglich auf Updates prüfen

i2c_device:
  - id: i2c_mlx90632
    address: 0x3A
    i2c_id: i2c_bus

sensor:
  - platform: vl53l4cd
    id: distance_sensor
    name: vlx53l4cd Distanz
    i2c_id: i2c_bus
    address: 0x29              # optional, Standard: 0x29
    timing_budget_ms: 200       # optional, Standard: 50 (10–200 ms)
    inter_measurement_ms: 0    # optional, Standard: 0 (Continuous-Mode)
    timeout_ms: 500            # optional, Standard: 500 ms
    update_interval: 500ms     # optional, Standard: 60s
    unit_of_measurement: "mm"
    filters:
      - lambda: |-
          return x * 1000 - 17;     // - 26;             // Offset -26mm, Meter -> Millimeter
    on_value:
      then:
        - lvgl.widget.refresh: distance_value_label

  # ── VL53L1X – Time-of-Flight Distanzsensor ────────────────
