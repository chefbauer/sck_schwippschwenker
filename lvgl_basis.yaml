# ================================
# LVGL Display Configuration Package
# Display Drehwurm - Basis Konfiguration
# Display: 1024x600 Pixel
# 
# Diese Datei wird als Package importiert:
# packages:
#   lvgl_config: !include lvgl_basis.yaml
# ================================

# Font Definitionen (Top-Level, nicht unter lvgl!)
font:
  - file: "gfonts://Roboto@700"
    id: font_title
    size: 60
    bpp: 4
    glyphs: " !\"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyzäöüÄÖÜß{|}~"

  - file: "gfonts://Roboto@400"
    id: font_normal
    size: 28
    bpp: 4
    glyphs: " !\"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyzäöüÄÖÜß{|}~"

  - file: "gfonts://Roboto@400"
    id: font_tab
    size: 30
    bpp: 4
    glyphs: " !\"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyzäöüÄÖÜß{|}~"

# LVGL Configuration
lvgl:
  log_level: INFO
  color_depth: 16
  
  # Farbdefinitionen (Helles Design)
  theme:
    obj:
      bg_color: 0xFFFFFF  # Weiß
      text_color: 0x000000  # Schwarz

  # Pages/Screens Definition
  pages:
    # ================================
    # PAGE 1: Hauptseite / Start
    # ================================
    - id: page_main
      widgets:
        # Haupt-Container
        - obj:
            id: main_container
            width: 1024
            height: 600
            bg_color: 0xFFFFFF  # Weiß
            bg_opa: COVER
            widgets:
              # Titel oben mittig
              - label:
                  id: main_title
                  text: "Supercooler Drehwurm Kühler"
                  align: TOP_MID
                  y: 20
                  text_font: font_title
                  text_color: 0x003366  # Dunkelblau
                  text_align: CENTER
              
              # Farbtest-Quadrate: Rot, Grün, Blau je 200x200
              - obj:
                  id: sq_red
                  width: 200
                  height: 200
                  align: CENTER
                  x: -220
                  y: 50
                  bg_color: 0xFF0000
                  bg_opa: COVER
                  border_width: 0
              - obj:
                  id: sq_green
                  width: 200
                  height: 200
                  align: CENTER
                  x: 0
                  y: 50
                  bg_color: 0x00FF00
                  bg_opa: COVER
                  border_width: 0
              - obj:
                  id: sq_blue
                  width: 200
                  height: 200
                  align: CENTER
                  x: 220
                  y: 50
                  bg_color: 0x0000FF
                  bg_opa: COVER
                  border_width: 0
              
              # Navigation Button zu Einstellungen
              - button:
                  id: btn_to_settings
                  width: 200
                  height: 60
                  align: BOTTOM_RIGHT
                  x: -20
                  y: -20
                  widgets:
                    - label:
                        text: "Einstellungen"
                        text_font: font_normal
                        text_color: 0xFFFFFF  # Weiß
                        align: CENTER
                  on_click:
                    - lvgl.page.show: page_settings

    # ================================
    # PAGE 2: Einstellungen
    # ================================
    - id: page_settings
      widgets:
        # Haupt-Container
        - obj:
            id: settings_container
            width: 1024
            height: 600
            bg_color: 0xFFFFFF
            bg_opa: COVER
            widgets:
              # Titel oben mittig
              - label:
                  id: settings_title
                  text: "Einstellungen"
                  align: TOP_MID
                  y: 20
                  text_font: font_title
                  text_color: 0x003366
                  text_align: CENTER

              # Tab-Ansicht
              - tabview:
                  id: settings_tabs
                  width: 1024
                  height: 490
                  align: TOP_MID
                  y: 100
                  tab_style:
                    bg_color: 0xE0E0E0
                    text_font: font_tab
                    text_color: 0x000000
                  tabs:
                    # Tab 1: Bildschirm
                    - name: "Bildschirm"
                      id: tab_bildschirm
                      widgets:
                        # Zeile: Helligkeit Label + Slider
                        - obj:
                            id: row_helligkeit
                            width: 960
                            height: 70
                            align: TOP_MID
                            y: 20
                            bg_opa: TRANSP
                            border_width: 0
                            widgets:
                              - label:
                                  id: lbl_helligkeit
                                  text: "Helligkeit"
                                  align: LEFT_MID
                                  x: 10
                                  text_font: font_normal
                                  text_color: 0x000000
                              - slider:
                                  id: slider_helligkeit
                                  width: 650
                                  height: 20
                                  align: RIGHT_MID
                                  x: -10
                                  min_value: 0
                                  max_value: 100
                                  value: 80
                                  on_value:
                                    - light.control:
                                        id: light_screen_background
                                        brightness: !lambda "return x / 100.0;"

                    # Tab 2: System
                    - name: "System"
                      id: tab_system
                      widgets:
                        - label:
                            id: lbl_system_placeholder
                            text: "System-Einstellungen folgen..."
                            align: CENTER
                            text_font: font_normal
                            text_color: 0x000000

                    # Tab 3: Kuehler
                    - name: "Kühler"
                      id: tab_kuehler
                      widgets:
                        - label:
                            id: lbl_kuehler_placeholder
                            text: "Kuehler-Einstellungen folgen..."
                            align: CENTER
                            text_font: font_normal
                            text_color: 0x000000

              # Zurück Button
              - button:
                  id: btn_back
                  width: 200
                  height: 60
                  align: BOTTOM_LEFT
                  x: 20
                  y: -20
                  bg_color: 0x444444
                  widgets:
                    - label:
                        text: "Zurück"
                        text_font: font_normal
                        text_color: 0xFFFFFF
                        align: CENTER
                  on_click:
                    - lvgl.page.show: page_main
