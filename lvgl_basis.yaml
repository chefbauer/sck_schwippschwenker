# ================================
# LVGL Display Configuration Package
# Display Drehwurm - Basis Konfiguration
# Display: 1024x600 Pixel
# 
# Diese Datei wird als Package importiert:
# packages:
#   lvgl_config: !include lvgl_basis.yaml
# ================================
# ── Komponenten ──────────────────────────────────────────────────────────────────
#  font:      font_title, font_normal, font_preset_num, font_tab, font_small,
#             font_clock, font_temp, font_icons, font_timer, font_arc_val, font_icon_xl
#  globals:   slot_start_ms, slot_elapsed_ms, slot_status,
#             brightness_auto_mode, brightness_auto_updating, system_ein
#  interval:  (kein id)
#  lvgl:      page_main, page_settings
# ─────────────────────────────────────────────────────────────────────────────────

# Font Definitionen (Top-Level, nicht unter lvgl!)
font:
  - file: "gfonts://Roboto@700"
    id: font_title
    size: 60
    bpp: 4
    glyphs: " -CEKPSaceghiklnoprstuwx"  # nur tatsächlich verwendete Zeichen (Größe ≥60 → minimale Glyph-Liste!)

  - file: "gfonts://Roboto@400"
    id: font_normal
    size: 28
    bpp: 4
    glyphs: " !\"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyzäöüÄÖÜß{|}~°·–"

  - file: "gfonts://Noto+Sans+Symbols@400"
    id: font_preset_num
    size: 28
    bpp: 4
    glyphs: "①②③④⑤"

  - file: "gfonts://Roboto@400"
    id: font_tab
    size: 30
    bpp: 4
    glyphs: " !\"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyzäöüÄÖÜß{|}~°"

  - file: "gfonts://Roboto@700"
    id: font_small
    size: 18
    bpp: 4
    glyphs: " !\"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyzäöüÄÖÜß{|}~°·–"

  # Uhrzeit-Font (Statusleiste hh:mm:ss)
  - file: "gfonts://Roboto@400"
    id: font_clock
    size: 22
    bpp: 4
    glyphs: "0123456789:- ,.DFMSaceghimnorstw"

  # Temperatur-Font (Statusleiste, gleiche Größe wie Schneeflocken-Symbol)
  - file: "gfonts://Roboto@400"
    id: font_temp
    size: 40
    bpp: 4
    glyphs: "0123456789.-°C "

  # Symbol-Font – Font Awesome Solid (Play/Pause/Schneeflocke/Einstellungen)
  - file: "https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/webfonts/fa-solid-900.ttf"
    id: font_icons
    size: 40
    bpp: 4
    glyphs:
      - "\uF04B"  # Play
      - "\uF04C"  # Pause
      - "\uF2DC"  # Schneeflocke
      - "\uF013"  # Zahnrad (Einstellungen)
      - "\uF545"  # Ruler (ToF Distanz)
      - "\uF2C9"  # Thermometer-half (Temperatur)
      - "\uF043"  # Droplet (Luftfeuchtigkeit)
      - "\uF72E"  # Wind (Luftdruck)
      - "\uF6FC"  # Mountain (Höhe)
      - "\uF185"  # Sun (Licht)
      - "\uF05B"  # Crosshairs / Laser (IR)
      - "\uF011"  # Power (Ein/Aus)
      - "\uF773"  # Water (Beckenfüllung)
      - "\uF021"  # arrows-rotate (Schwenker Start/Stop)

  # Dot-Matrix Font für Timer-Anzeige
  - file: "fonts/5x7-dot-matrix.ttf"
    id: font_timer
    size: 38
    bpp: 1
    glyphs: "0123456789:"

  # Arc-Wert-Font (Schwenker-Overlay, groß)
  - file: "gfonts://Roboto@400"
    id: font_arc_val
    size: 56
    bpp: 4
    glyphs: "0123456789.s% "

  # Großes Drehsymbol für Schwenker-Button (Font Awesome arrows-rotate U+F021)
  - file: "https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/webfonts/fa-solid-900.ttf"
    id: font_icon_xl
    size: 120
    bpp: 4
    glyphs:
      - "\uF021"  # arrows-rotate (Drehsymbol)

# Timer-Globals für alle 6 Slots
# Status: 0=gestoppt  1=läuft  2=pausiert
globals:
  - id: slot_start_ms
    type: std::array<uint32_t, 6>
    restore_value: false
    initial_value: '{0, 0, 0, 0, 0, 0}'
  - id: slot_elapsed_ms
    type: std::array<uint32_t, 6>
    restore_value: false
    initial_value: '{0, 0, 0, 0, 0, 0}'
  - id: slot_status
    type: std::array<int, 6>
    restore_value: false
    initial_value: '{0, 0, 0, 0, 0, 0}'
  # Helligkeits-Automodus (VEML7700)
  - id: brightness_auto_mode
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: brightness_auto_updating
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: system_ein
    type: bool
    restore_value: true
    initial_value: 'false'
interval:
  - interval: 500ms
    then:
      - lambda: |-
          char buf[6];
          if (id(slot_status)[0] == 1) {
            uint32_t s = (id(slot_elapsed_ms)[0] + (millis() - id(slot_start_ms)[0])) / 1000;
            snprintf(buf, sizeof(buf), "%02u:%02u", (unsigned)(s / 60), (unsigned)(s % 60));
            lv_label_set_text(id(lbl_slot1_time), buf);
          }
          if (id(slot_status)[1] == 1) {
            uint32_t s = (id(slot_elapsed_ms)[1] + (millis() - id(slot_start_ms)[1])) / 1000;
            snprintf(buf, sizeof(buf), "%02u:%02u", (unsigned)(s / 60), (unsigned)(s % 60));
            lv_label_set_text(id(lbl_slot2_time), buf);
          }
          if (id(slot_status)[2] == 1) {
            uint32_t s = (id(slot_elapsed_ms)[2] + (millis() - id(slot_start_ms)[2])) / 1000;
            snprintf(buf, sizeof(buf), "%02u:%02u", (unsigned)(s / 60), (unsigned)(s % 60));
            lv_label_set_text(id(lbl_slot3_time), buf);
          }
          if (id(slot_status)[3] == 1) {
            uint32_t s = (id(slot_elapsed_ms)[3] + (millis() - id(slot_start_ms)[3])) / 1000;
            snprintf(buf, sizeof(buf), "%02u:%02u", (unsigned)(s / 60), (unsigned)(s % 60));
            lv_label_set_text(id(lbl_slot4_time), buf);
          }
          if (id(slot_status)[4] == 1) {
            uint32_t s = (id(slot_elapsed_ms)[4] + (millis() - id(slot_start_ms)[4])) / 1000;
            snprintf(buf, sizeof(buf), "%02u:%02u", (unsigned)(s / 60), (unsigned)(s % 60));
            lv_label_set_text(id(lbl_slot5_time), buf);
          }
          if (id(slot_status)[5] == 1) {
            uint32_t s = (id(slot_elapsed_ms)[5] + (millis() - id(slot_start_ms)[5])) / 1000;
            snprintf(buf, sizeof(buf), "%02u:%02u", (unsigned)(s / 60), (unsigned)(s % 60));
            lv_label_set_text(id(lbl_slot6_time), buf);
          }
          // AMG8833 Overlay aktualisieren wenn sichtbar
          if (!lv_obj_has_flag(id(overlay_amg8833), LV_OBJ_FLAG_HIDDEN)) {
            amg_update_cells(id(amg_pixel_temps).data());
          }
          // Uhrzeit in Statusleiste aktualisieren (SNTP)
          auto t = id(sntp_time).now();
          if (t.is_valid()) {
            char tbuf[9];
            snprintf(tbuf, sizeof(tbuf), "%02d:%02d:%02d", t.hour, t.minute, t.second);
            lv_label_set_text(id(lbl_status_clock), tbuf);
            static const char* wdays[] = {"Sonntag", "Montag", "Dienstag", "Mittwoch", "Donnerstag", "Freitag", "Samstag"};
            char dbuf[24];
            int dow = t.day_of_week - 1;  // ESPHome: 1=Sonntag..7=Samstag → 0-basiert
            if (dow < 0 || dow > 6) dow = 0;  // Bounds check
            snprintf(dbuf, sizeof(dbuf), "%s, %02d.%02d.", wdays[dow], t.day_of_month, t.month);
            lv_label_set_text(id(lbl_status_date), dbuf);
          }

# LVGL Configuration
lvgl:
  log_level: INFO
  color_depth: 16
  
  # Farbdefinitionen (Helles Design)
  theme:
    obj:
      bg_color: 0xFFFFFF  # Weiß
      text_color: 0x000000  # Schwarz

  # Pages/Screens Definition
  pages:
    # ================================
    # PAGE 1: Hauptseite / Start
    # ================================
    - id: page_main
      widgets:
        # Haupt-Container
        - obj:
            id: main_container
            width: 1024
            height: 600
            bg_color: 0xFFFFFF  # Weiß
            bg_opa: COVER
            scrollable: false
            scrollbar_mode: "off"
            pad_all: 0
            widgets:
              # Titel oben mittig
              - label:
                  id: main_title
                  text: "SCK Schwippschwenker"
                  align: TOP_MID
                  y: 20
                  text_font: font_title
                  text_color: 0x003366  # Dunkelblau
                  text_align: CENTER

              # System-Hauptschalter / Notschalter rechts oben
              # AUS: sofort bei on_press (Notfall!)  | EIN: nur per Long Press (Schutz vor Versehen)
              - button:
                  id: btn_system_power
                  width: 80
                  height: 80
                  align: TOP_RIGHT
                  x: -10
                  y: 10
                  radius: 40
                  bg_color: 0xAA2200
                  bg_opa: COVER
                  border_width: 0
                  shadow_width: 0
                  outline_width: 0
                  pad_all: 0
                  on_press:
                    - lambda: |-
                        id(script_system_aus).execute();  // NOTAUS: immer, egal ob EIN oder AUS
                  on_long_press:
                    - lambda: |-
                        if (!id(system_ein)) {
                          id(script_system_ein).execute();  // EIN: nur per Long Press
                        }
                  widgets:
                    - label:
                        id: lbl_power_icon
                        align: CENTER
                        text: "\uF011"
                        text_font: font_icons
                        text_color: 0xFFFFFF
              
              # Beckenfüllungs-Button (rund, tangential 45° rechts unten am Ring)
              - button:
                  id: btn_beckenfuellung
                  width: 80
                  height: 80
                  align: CENTER
                  x: 156
                  y: 176
                  radius: 40
                  bg_color: 0x555555
                  bg_opa: COVER
                  border_width: 0
                  shadow_width: 0
                  outline_width: 0
                  pad_all: 0
                  on_short_click:
                    - lambda: |-
                        if (id(pumpe_a_aktiv)) {
                          id(script_pumpe_a_kurz).stop();
                          id(script_pumpe_a_lang).stop();
                          id(script_pumpe_a_aus).execute();
                        } else {
                          id(script_pumpe_a_kurz).execute();
                        }
                  on_long_press:
                    - lambda: |-
                        if (id(pumpe_a_aktiv)) {
                          id(script_pumpe_a_kurz).stop();
                          id(script_pumpe_a_lang).stop();
                          id(script_pumpe_a_aus).execute();
                        } else {
                          id(script_pumpe_a_lang).execute();
