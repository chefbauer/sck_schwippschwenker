# ESPHome LVGL Display Configuration
# Display Drehwurm - Basis Konfiguration
# Display: 1024x600 Pixel

esphome:
  name: display-drehwurm
  friendly_name: Drehwurm Kühler Display

esp32:
  board: esp32dev
  framework:
    type: arduino

# WiFi Configuration (anpassen)
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  
  ap:
    ssid: "Display-Drehwurm"
    password: "12345678"

# API & OTA
api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: DEBUG

# Display Configuration
display:
  - platform: ili9xxx  # Anpassen je nach Display-Controller
    model: ili9488
    cs_pin: GPIO15
    dc_pin: GPIO2
    reset_pin: GPIO4
    rotation: 0
    dimensions:
      width: 1024
      height: 600

# LVGL Configuration
lvgl:
  log_level: INFO
  color_depth: 16
  
  # Display Binding
  displays:
    - display_id: my_display
  
  # Font Definitionen
  fonts:
    - file: "fonts/Roboto-Bold.ttf"
      id: font_title
      size: 60
      bpp: 4
      glyphs: |
        !"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\]^_`abcdefghijklmnopqrstuvwxyzäöüÄÖÜß{|}~

    - file: "fonts/Roboto-Regular.ttf"
      id: font_normal
      size: 28
      bpp: 4
      glyphs: |
        !"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\]^_`abcdefghijklmnopqrstuvwxyzäöüÄÖÜß{|}~

  # Farbdefinitionen
  theme:
    obj:
      bg_color: 0x001428  # Dunkelblau
      text_color: 0xFFFFFF  # Weiß
    
  # Styles
  styles:
    - id: style_title
      text_font: font_title
      text_color: 0x00FFD4  # Cyan
      text_align: center
      bg_color: 0x001428
      bg_opa: cover
      pad_all: 10
    
    - id: style_container
      bg_color: 0x002850
      bg_opa: cover
      border_color: 0x00A8E8
      border_width: 2
      radius: 10
      pad_all: 15

  # Pages/Screens Definition
  pages:
    # ================================
    # PAGE 1: Hauptseite / Start
    # ================================
    - id: page_main
      widgets:
        # Haupt-Container
        - obj:
            id: main_container
            width: 1024
            height: 600
            bg_color: 0x001428
            bg_opa: cover
            widgets:
              # Titel oben mittig
              - label:
                  id: main_title
                  text: "Supercooler Drehwurm Kühler"
                  align: TOP_MID
                  y: 20
                  text_font: font_title
                  text_color: 0x00FFD4  # Cyan
                  text_align: CENTER
              
              # Status Container (Platzhalter für Sensoren)
              - obj:
                  id: status_container
                  width: 900
                  height: 400
                  align: CENTER
                  y: 50
                  styles: style_container
                  widgets:
                    - label:
                        id: status_label
                        text: "System bereit"
                        align: CENTER
                        text_font: font_normal
                        text_color: 0xFFFFFF
              
              # Navigation Button zu Einstellungen
              - btn:
                  id: btn_to_settings
                  width: 200
                  height: 60
                  align: BOTTOM_RIGHT
                  x: -20
                  y: -20
                  widgets:
                    - label:
                        text: "⚙ Einstellungen"
                        text_font: font_normal
                        text_color: 0xFFFFFF
                        align: CENTER
                  on_click:
                    - lvgl.page.show: page_settings

    # ================================
    # PAGE 2: Einstellungen
    # ================================
    - id: page_settings
      widgets:
        # Haupt-Container
        - obj:
            id: settings_container
            width: 1024
            height: 600
            bg_color: 0x001428
            bg_opa: cover
            widgets:
              # Titel oben mittig
              - label:
                  id: settings_title
                  text: "Einstellungen"
                  align: TOP_MID
                  y: 20
                  text_font: font_title
                  text_color: 0x00FFD4  # Cyan
                  text_align: CENTER
              
              # Einstellungs-Container (Platzhalter)
              - obj:
                  id: config_container
                  width: 900
                  height: 400
                  align: CENTER
                  y: 50
                  styles: style_container
                  widgets:
                    - label:
                        id: config_label
                        text: "Konfigurationsoptionen folgen..."
                        align: CENTER
                        text_font: font_normal
                        text_color: 0xFFFFFF
              
              # Zurück Button
              - btn:
                  id: btn_back
                  width: 200
                  height: 60
                  align: BOTTOM_LEFT
                  x: 20
                  y: -20
                  widgets:
                    - label:
                        text: "← Zurück"
                        text_font: font_normal
                        text_color: 0xFFFFFF
                        align: CENTER
                  on_click:
                    - lvgl.page.show: page_main

