                        y: 0
                        bg_color: 0xFF00FF
                        bg_opa: COVER
                        border_width: 0
                        radius: 0
                        pad_all: 0
                        scrollable: false
                        clickable: false
                        widgets:
                          - label:
                              text: "6"
                              align: CENTER
                              text_font: font_normal
                              text_color: 0xFFFFFF
                    - obj:
                        id: slot6_timer_area
                        width: 240
                        height: 100%
                        align: TOP_RIGHT
                        x: 0
                        y: 0
                        bg_color: 0xFF00FF
                        bg_opa: 50%
                        border_width: 0
                        radius: 0
                        pad_left: 12
                        pad_top: 0
                        pad_right: 0
                        pad_bottom: 0
                        scrollable: false
                        clickable: false
                        widgets:
                          - label:
                              id: lbl_slot6_timer_title
                              text: "Timer:"
                              align: TOP_LEFT
                              x: 0
                              y: 10
                              text_font: font_normal
                              text_color: 0x880044
                          - label:
                              id: lbl_slot6_time
                              text: "00:00"
                              align: TOP_LEFT
                              x: 0
                              y: 52
                              text_font: font_normal
                              text_color: 0x880044
                          - label:
                              id: lbl_slot6_symbol
                              text: "\uF04B"
                              text_font: font_icons
                              align: RIGHT_MID
                              x: -17
                              text_color: 0x880044

              # Navigation Button zu Einstellungen
              - button:
                  id: btn_to_settings
                  width: 200
                  height: 60
                  align: BOTTOM_RIGHT
                  x: -20
                  y: -20
                  widgets:
                    - label:
                        text: "Einstellungen"
                        text_font: font_normal
                        text_color: 0xFFFFFF  # Weiß
                        align: CENTER
                  on_click:
                    - lvgl.page.show: page_settings

    # ================================
    # PAGE 2: Einstellungen
    # ================================
    - id: page_settings
      widgets:
        # Haupt-Container
        - obj:
            id: settings_container
            width: 1024
            height: 600
            bg_color: 0xFFFFFF
            bg_opa: COVER
            widgets:
              # Titel oben mittig
              - label:
                  id: settings_title
                  text: "Einstellungen"
                  align: TOP_MID
                  y: 20
                  text_font: font_title
                  text_color: 0x003366
                  text_align: CENTER

              # Tab-Ansicht
              - tabview:
                  id: settings_tabs
                  width: 1024
                  height: 490
                  align: TOP_MID
                  y: 100
                  tab_style:
                    bg_color: 0xE0E0E0
                    text_font: font_tab
                    text_color: 0x000000
                  tabs:
                    # Tab 1: Bildschirm
                    - name: "Bildschirm"
                      id: tab_bildschirm
                      widgets:
                        # Zeile: Helligkeit Label + Slider
                        - obj:
                            id: row_helligkeit
                            width: 960
                            height: 70
                            align: TOP_MID
                            y: 20
                            bg_opa: TRANSP
                            border_width: 0
                            widgets:
                              - label:
                                  id: lbl_helligkeit
                                  text: "Helligkeit"
                                  align: LEFT_MID
                                  x: 10
                                  text_font: font_normal
                                  text_color: 0x000000
                              - slider:
                                  id: slider_helligkeit
                                  width: 650
                                  height: 20
                                  align: RIGHT_MID
                                  x: -10
                                  min_value: 0
                                  max_value: 100
                                  value: 80
                                  on_value:
                                    - light.control:
                                        id: light_screen_background
                                        brightness: !lambda "return x / 100.0;"

                        # Farbtest-Quadrate (150 x 150)
                        - obj:
                            id: row_farben
                            width: 960
                            height: 170
                            align: TOP_MID
                            y: 110
                            bg_opa: TRANSP
                            border_width: 0
                            widgets:
                              - obj:
                                  id: sq_red
                                  width: 150
                                  height: 150
                                  align: CENTER
                                  x: -180
                                  bg_color: 0xFF0000
                                  bg_opa: COVER
                                  border_width: 0
                              - obj:
                                  id: sq_green
                                  width: 150
                                  height: 150
                                  align: CENTER
                                  x: 0
                                  bg_color: 0x00FF00
                                  bg_opa: COVER
                                  border_width: 0
                              - obj:
                                  id: sq_blue
                                  width: 150
                                  height: 150
                                  align: CENTER
                                  x: 180
                                  bg_color: 0x0000FF
                                  bg_opa: COVER
                                  border_width: 0

                    # Tab 2: System
                    - name: "System"
                      id: tab_system
                      widgets:
                        - label:
                            id: lbl_system_placeholder
                            text: "System-Einstellungen folgen..."
                            align: CENTER
                            text_font: font_normal
                            text_color: 0x000000

                    # Tab 3: Kuehler
                    - name: "Kühler"
                      id: tab_kuehler
                      widgets:
                        - label:
                            id: lbl_kuehler_placeholder
                            text: "Kuehler-Einstellungen folgen..."
                            align: CENTER
                            text_font: font_normal
                            text_color: 0x000000

              # Zurück Button
              - button:
                  id: btn_back
                  width: 200
                  height: 60
                  align: BOTTOM_LEFT
                  x: 20
                  y: -20
                  bg_color: 0x444444
                  widgets:
                    - label:
                        text: "Zurück"
                        text_font: font_normal
                        text_color: 0xFFFFFF
                        align: CENTER
                  on_click:
                    - lvgl.page.show: page_main
