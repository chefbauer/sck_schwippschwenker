# ================================
# LVGL Display Configuration Package
# Display Drehwurm - Basis Konfiguration
# Display: 1024x600 Pixel
# 
# Diese Datei wird als Package importiert:
# packages:
#   lvgl_config: !include lvgl_basis.yaml
# ================================

# Font Definitionen (Top-Level, nicht unter lvgl!)
font:
  - file: "gfonts://Roboto@700"
    id: font_title
    size: 60
    bpp: 4
    glyphs: " !\"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyzäöüÄÖÜß{|}~"

  - file: "gfonts://Roboto@400"
    id: font_normal
    size: 28
    bpp: 4
    glyphs: " !\"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyzäöüÄÖÜß{|}~"

  - file: "gfonts://Roboto@400"
    id: font_tab
    size: 30
    bpp: 4
    glyphs: " !\"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyzäöüÄÖÜß{|}~"

  # Symbol-Font – Font Awesome Solid (Play/Pause)
  - file: "https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/webfonts/fa-solid-900.ttf"
    id: font_icons
    size: 40
    bpp: 4
    glyphs:
      - "\uF04B"
      - "\uF04C"

# Timer-Globals für alle 6 Slots
# Status: 0=gestoppt  1=läuft  2=pausiert
globals:
  - id: slot_start_ms
    type: std::array<uint32_t, 6>
    restore_value: false
    initial_value: '{0, 0, 0, 0, 0, 0}'
  - id: slot_elapsed_ms
    type: std::array<uint32_t, 6>
    restore_value: false
    initial_value: '{0, 0, 0, 0, 0, 0}'
  - id: slot_status
    type: std::array<int, 6>
    restore_value: false
    initial_value: '{0, 0, 0, 0, 0, 0}'
interval:
  - interval: 500ms
    then:
      - lambda: |-
          char buf[6];
          if (id(slot_status)[0] == 1) {
            uint32_t s = (id(slot_elapsed_ms)[0] + (millis() - id(slot_start_ms)[0])) / 1000;
            snprintf(buf, sizeof(buf), "%02u:%02u", (unsigned)(s / 60), (unsigned)(s % 60));
            lv_label_set_text(id(lbl_slot1_time), buf);
          }
          if (id(slot_status)[1] == 1) {
            uint32_t s = (id(slot_elapsed_ms)[1] + (millis() - id(slot_start_ms)[1])) / 1000;
            snprintf(buf, sizeof(buf), "%02u:%02u", (unsigned)(s / 60), (unsigned)(s % 60));
            lv_label_set_text(id(lbl_slot2_time), buf);
          }
          if (id(slot_status)[2] == 1) {
            uint32_t s = (id(slot_elapsed_ms)[2] + (millis() - id(slot_start_ms)[2])) / 1000;
            snprintf(buf, sizeof(buf), "%02u:%02u", (unsigned)(s / 60), (unsigned)(s % 60));
            lv_label_set_text(id(lbl_slot3_time), buf);
          }
          if (id(slot_status)[3] == 1) {
            uint32_t s = (id(slot_elapsed_ms)[3] + (millis() - id(slot_start_ms)[3])) / 1000;
            snprintf(buf, sizeof(buf), "%02u:%02u", (unsigned)(s / 60), (unsigned)(s % 60));
            lv_label_set_text(id(lbl_slot4_time), buf);
          }
          if (id(slot_status)[4] == 1) {
            uint32_t s = (id(slot_elapsed_ms)[4] + (millis() - id(slot_start_ms)[4])) / 1000;
            snprintf(buf, sizeof(buf), "%02u:%02u", (unsigned)(s / 60), (unsigned)(s % 60));
            lv_label_set_text(id(lbl_slot5_time), buf);
          }
          if (id(slot_status)[5] == 1) {
            uint32_t s = (id(slot_elapsed_ms)[5] + (millis() - id(slot_start_ms)[5])) / 1000;
            snprintf(buf, sizeof(buf), "%02u:%02u", (unsigned)(s / 60), (unsigned)(s % 60));
            lv_label_set_text(id(lbl_slot6_time), buf);
          }

# LVGL Configuration
lvgl:
  log_level: INFO
  color_depth: 16
  
  # Farbdefinitionen (Helles Design)
  theme:
    obj:
      bg_color: 0xFFFFFF  # Weiß
      text_color: 0x000000  # Schwarz

  # Pages/Screens Definition
  pages:
    # ================================
    # PAGE 1: Hauptseite / Start
    # ================================
    - id: page_main
      widgets:
        # Haupt-Container
        - obj:
            id: main_container
            width: 1024
            height: 600
            bg_color: 0xFFFFFF  # Weiß
            bg_opa: COVER
            widgets:
              # Titel oben mittig
              - label:
                  id: main_title
                  text: "Supercooler Drehwurm Kühler"
                  align: TOP_MID
                  y: 20
                  text_font: font_title
                  text_color: 0x003366  # Dunkelblau
                  text_align: CENTER
              
              # 3D-Behälter mit Wasserstand (Proportionen: Ø25cm / H24cm)
              # TODO: Durch echtes Bild ersetzen sobald verfügbar
              - obj:
                  id: container_tank
                  width: 360
                  height: 360
                  align: CENTER
                  y: 20
                  bg_opa: TRANSP
                  border_width: 0
                  widgets:
                    # Zylinderkörper (Mantel-Rechteck)
                    - obj:
                        id: cyl_body
                        width: 280
                        height: 240
                        align: TOP_MID
                        y: 40
                        bg_color: 0x708090
                        border_width: 3
                        border_color: 0x2A3A4A
                        radius: 4
                    # Boden-Ellipse – radius = Hälfte der Höhe → oval
                    - obj:
                        id: cyl_bottom
                        width: 280
                        height: 80
                        align: TOP_MID
                        y: 240
                        radius: 40
                        bg_color: 0x4A5A6A
                        border_width: 3
                        border_color: 0x2A3A4A
                    # Wasser-Körper
                    - obj:
                        id: water_body
                        width: 264
                        height: 204
                        align: TOP_MID
                        y: 76
                        bg_color: 0x2E7BB5
                        border_width: 0
                        radius: 0
                    # Wasser-Oberfläche
                    - obj:
                        id: water_surface
                        width: 264
                        height: 60
                        align: TOP_MID
                        y: 46
                        radius: 30
                        bg_color: 0x5BB0E0
                        border_width: 0
                    # Oberer Rand / Öffnung
                    - obj:
                        id: cyl_rim
                        width: 280
                        height: 80
                        align: TOP_MID
                        y: 0
                        radius: 40
                        bg_color: 0x8898A8
                        border_width: 3
                        border_color: 0x2A3A4A

              # ---- Slot-Container links: Slot 1 (R), 2 (Y), 3 (G) ----
              - button:
                  id: slot1_red
                  width: 290
                  height: 120
                  align: TOP_LEFT
                  x: 15
                  y: 110
                  radius: 16
                  clip_corner: true
                  bg_opa: TRANSP
                  border_width: 0
                  shadow_width: 0
                  outline_width: 0
                  pad_all: 0
                  scrollable: false
                  on_short_click:
                    - lambda: |-
                        int i = 0;
                        if (id(slot_status)[i] == 0 || id(slot_status)[i] == 2) {
                          id(slot_start_ms)[i] = millis();
                          id(slot_status)[i] = 1;
                          lv_label_set_text(id(lbl_slot1_symbol), "\xef\x81\x8c");
                          ESP_LOGI("timer", "Timer 1: Start");
                        } else {
                          id(slot_elapsed_ms)[i] += millis() - id(slot_start_ms)[i];
                          id(slot_status)[i] = 2;
                          lv_label_set_text(id(lbl_slot1_symbol), "\xef\x81\x8b");
                          ESP_LOGI("timer", "Timer 1: Stop");
                        }
                  on_long_press:
                    - lambda: |-
                        int i = 0;
                        if (id(slot_status)[i] == 2) {
                          id(slot_elapsed_ms)[i] = 0;
                          id(slot_start_ms)[i] = 0;
                          id(slot_status)[i] = 0;
                          lv_label_set_text(id(lbl_slot1_time), "00:00");
                          lv_label_set_text(id(lbl_slot1_symbol), "\xef\x81\x8b");
                          ESP_LOGI("timer", "Timer 1: Reset");
