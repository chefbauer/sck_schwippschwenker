                                  text_font: font_small
                                  text_color: 0x888888
                              - slider:
                                  id: slider_motor_strom
                                  width: 580
                                  height: 30
                                  align: LEFT_MID
                                  x: 240
                                  min_value: 500
                                  max_value: 2000
                                  value: 1000
                                  on_release:
                                    - lambda: |-
                                        id(sw_work_current_mA) = (int)x;  // in NVS speichern
                                        id(script_motor_set_work_current_mA).execute(x);
                                        char buf[12];
                                        snprintf(buf, sizeof(buf), "%d mA", (int)x);
                                        lv_label_set_text(id(lbl_motor_strom_wert), buf);
                                        ESP_LOGI("settings", "Motor Strom gesetzt: %d mA", (int)x);
