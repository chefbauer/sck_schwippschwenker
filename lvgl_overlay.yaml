lvgl:
  top_layer:
    widgets:
      # ================================
      # OVERLAY: AMG8833 Live-Ansicht
      # ================================
      - obj:
          id: overlay_amg8833
          width: 100%
          height: 100%
          bg_color: 0xFFFFFF
          bg_opa: 90%
          hidden: true
          clickable: true
          pad_all: 0
          scrollable: false
          widgets:
            # 8×8 Grid Container (496×496 px, leicht links zentriert)
            # Zellen werden per amg_create_grid() beim ersten Öffnen erstellt
            - obj:
                id: amg_grid_container
                width: 496
                height: 496
                align: CENTER
                x: -50
                bg_opa: TRANSP
                border_width: 0
                pad_all: 0
                scrollable: false

            # Exit-Button (rechts oben)
            - button:
                id: btn_amg_exit
                width: 80
                height: 60
                align: TOP_RIGHT
                x: -10
                y: 10
                bg_color: 0xCC3333
                widgets:
                  - label:
                      text: "X"
                      align: CENTER
                      text_font: font_normal
                      text_color: 0xFFFFFF
                on_click:
                  - lvgl.widget.hide: overlay_amg8833

            # Modus-Umschalter (rechts mitte): Normal ↔ Kalt
            - button:
                id: btn_amg_mode
                width: 80
                height: 80
                align: RIGHT_MID
                x: -10
                bg_color: 0x225599
                widgets:
                  - label:
                      id: lbl_amg_mode
                      text: "Normal"
                      align: CENTER
                      text_font: font_small
                      text_color: 0xFFFFFF
                on_click:
                  - lambda: |-
                      amg_cold_mode = !amg_cold_mode;
                      lv_label_set_text(id(lbl_amg_mode), amg_cold_mode ? "Kalt" : "Normal");
                      lv_obj_set_style_bg_color(id(btn_amg_mode),
                        amg_cold_mode ? lv_color_hex(0x0088CC) : lv_color_hex(0x225599), 0);
                      amg_refresh_cells();

      # ================================
      # OVERLAY: Sensor-Phalanx
      # MLX90632 · VL53L1X · SHT4x · BMP581 · VEML7700
      # ================================
      - obj:
          id: overlay_sensorphalanx
          width: 100%
          height: 100%
          bg_color: 0xFFFFFF
          bg_opa: 93%
          hidden: true
          clickable: true
          pad_all: 0
          scrollable: false
          widgets:
            # Titel
            - label:
                id: lbl_sensorphalanx_title
                text: "Sensor-Phalanx"
                align: TOP_MID
                y: 12
                text_font: font_title
                text_color: 0x003366
                text_align: CENTER

            # Exit-Button
            - button:
                id: btn_sensorphalanx_exit
                width: 80
                height: 55
                align: TOP_RIGHT
                x: -10
                y: 10
                bg_color: 0xCC3333
                widgets:
                  - label:
                      text: "X"
                      align: CENTER
                      text_font: font_normal
                      text_color: 0xFFFFFF
                on_click:
                  - lvgl.widget.hide: overlay_sensorphalanx

            # ── Zeile 1: VL53L1X Distanz ──────────────────────────
            - obj:
                id: row_sp_tof
                width: 860
                height: 65
                align: TOP_LEFT
                x: 15
                y: 82
                bg_color: 0xF0F4F8
                border_width: 0
                radius: 10
                scrollable: false
                widgets:
                  - obj:
                      id: badge_sp_tof
                      width: 72
                      height: 53
                      align: LEFT_MID
                      x: 6
                      bg_color: 0x2255CC
                      radius: 8
                      border_width: 0
                      scrollable: false
                      widgets:
                        - label:
                            text: "ToF"
                            align: CENTER
                            text_font: font_small
                            text_color: 0xFFFFFF
                  - label:
                      text: "Distanz"
                      align: LEFT_MID
                      x: 90
                      text_font: font_normal
                      text_color: 0x000000
                  - label:
                      text: "Time-of-Flight · VL53L1X · 50–4000 mm"
                      align: LEFT_MID
                      x: 265
                      text_font: font_small
                      text_color: 0x555555
                  - label:
                      id: distance_value_label
                      text: "---"
                      align: RIGHT_MID
                      x: -15
                      text_font: font_normal
                      text_color: 0x003366

            # ── Zeile 2: SHT4x Temperatur ─────────────────────────
