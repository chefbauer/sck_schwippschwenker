lvgl:
  top_layer:
    widgets:
      # ================================
      # OVERLAY: AMG8833 Live-Ansicht
      # ================================
      - obj:
          id: overlay_amg8833
          width: 100%
          height: 100%
          bg_color: 0xFFFFFF
          bg_opa: 90%
          hidden: true
          clickable: true
          pad_all: 0
          scrollable: false
          widgets:
            # 8×8 Grid Container (496×496 px, leicht links zentriert)
            # Zellen werden per amg_create_grid() beim ersten Öffnen erstellt
            - obj:
                id: amg_grid_container
                width: 496
                height: 496
                align: CENTER
                x: -50
                bg_opa: TRANSP
                border_width: 0
                pad_all: 0
                scrollable: false

            # Exit-Button (rechts oben)
            - button:
                id: btn_amg_exit
                width: 80
                height: 60
                align: TOP_RIGHT
                x: -10
                y: 10
                bg_color: 0xCC3333
                widgets:
                  - label:
                      text: "X"
                      align: CENTER
                      text_font: font_normal
                      text_color: 0xFFFFFF
                on_click:
                  - lvgl.widget.hide: overlay_amg8833

            # Modus-Umschalter (rechts mitte): Normal ↔ Kalt
            - button:
                id: btn_amg_mode
                width: 80
                height: 80
                align: RIGHT_MID
                x: -10
                bg_color: 0x225599
                widgets:
                  - label:
                      id: lbl_amg_mode
                      text: "Normal"
                      align: CENTER
                      text_font: font_small
                      text_color: 0xFFFFFF
                on_click:
                  - lambda: |-
                      amg_cold_mode = !amg_cold_mode;
                      lv_label_set_text(id(lbl_amg_mode), amg_cold_mode ? "Kalt" : "Normal");
                      lv_obj_set_style_bg_color(id(btn_amg_mode),
                        amg_cold_mode ? lv_color_hex(0x0088CC) : lv_color_hex(0x225599), 0);
                      amg_refresh_cells();

      # ================================
      # OVERLAY: Sensor-Phalanx
      # MLX90632 · VL53L1X · SHT4x · BMP581 · VEML7700
      # ================================
      # OVERLAY: Schwenker-Einstellungen
      # ================================
      - obj:
          id: overlay_schwenker_settings
          width: 100%
          height: 100%
          bg_color: 0xFFFFFF
          bg_opa: 97%
          hidden: true
          clickable: true
          pad_all: 0
          scrollable: false
          widgets:
            # Titel
            - label:
                text: "Schwenker Einstellungen"
                align: TOP_MID
                y: 18
                text_font: font_title
                text_color: 0x003366
                text_align: CENTER

            # Exit-Button
            - button:
                id: btn_schwenker_settings_exit
                width: 80
                height: 55
                align: TOP_RIGHT
                x: -10
                y: 10
                bg_color: 0xCC3333
                widgets:
                  - label:
                      text: "X"
                      align: CENTER
                      text_font: font_normal
                      text_color: 0xFFFFFF
                on_click:
                  - lvgl.widget.hide: overlay_schwenker_settings

            # ── Motor-Modus: Closed Loop / FOC ────────────────────────
            - button:
                id: btn_sw_motor_mode_toggle
                width: 260
                height: 48
                align: TOP_MID
                x: 0
                y: 65
                bg_color: 0x226644
                border_width: 2
                border_color: 0x44AA77
                radius: 10
                widgets:
                  - label:
                      id: lbl_sw_motor_mode
                      text: "Motor: Closed Loop"
                      align: CENTER
                      text_font: font_small
                      text_color: 0xFFFFFF
                on_click:
                  - lambda: |-
                      id(sw_motor_mode) = (id(sw_motor_mode) == 0) ? 1 : 0;
                      lv_label_set_text(id(lbl_sw_motor_mode),
                        id(sw_motor_mode) == 1 ? "Motor: FOC" : "Motor: Closed Loop");
                      lv_obj_set_style_bg_color(id(btn_sw_motor_mode_toggle),
                        id(sw_motor_mode) == 1 ? lv_color_hex(0x885522) : lv_color_hex(0x226644), 0);

            # ── F4-Test-Button ─────────────────────────────────────
            - button:
                id: btn_open_sw_test
                width: 260
                height: 48
                align: TOP_MID
                x: 0
                y: 120
                bg_color: 0x553388
                border_width: 2
                border_color: 0x9966CC
                radius: 10
                widgets:
                  - label:
                      text: "F4-Test (Winkel/Speed/Acc)"
                      align: CENTER
                      text_font: font_small
                      text_color: 0xFFFFFF
                on_click:
                  - lvgl.widget.show: overlay_schwenker_test

            # ── Arc 1: Schwenkzeit ─────────────────────────────────
            - obj:
                id: arc_area_zeit
                width: 420
                height: 340
                align: TOP_LEFT
                x: 60
                y: 100
                bg_opa: TRANSP
                border_width: 0
                scrollable: false
                clickable: false
                pad_all: 0
                widgets:
                  - label:
                      text: "Schwenkzeit"
                      align: TOP_MID
                      y: 0
                      text_font: font_normal
                      text_color: 0x334455
                  - arc:
                      id: arc_schwenkzeit
                      width: 280
                      height: 280
                      align: TOP_MID
                      y: 35
                      min_value: 10      # = 1.0 s
                      max_value: 100     # = 10.0 s
                      value: 32          # = 3.2 s (default)
                      adjustable: true
                      arc_color: 0x2299FF
                      arc_width: 18
                      indicator:
                        arc_color: 0x55EEFF
                        arc_width: 18
                      knob:
                        bg_color: 0x55EEFF
                        width: 26
                        height: 26
                        radius: 13
                      on_value:
                        - lambda: |-
                            id(sw_halbperiode_ms) = (uint32_t)(x * 100);
                            char buf[8];
                            snprintf(buf, sizeof(buf), "%.1fs", x / 10.0f);
                            lv_label_set_text(id(lbl_arc_zeit_val), buf);
                  - label:
                      id: lbl_arc_zeit_val
                      text: "3.2s"
                      align: TOP_MID
                      y: 140
                      text_font: font_arc_val
                      text_color: 0x0077CC
                      text_align: CENTER

            # ── Arc 2: Max RPM ─────────────────────────────────────
            - obj:
                id: arc_area_rpm
                width: 420
                height: 340
                align: TOP_RIGHT
                x: -60
                y: 100
                bg_opa: TRANSP
                border_width: 0
                scrollable: false
                clickable: false
                pad_all: 0
                widgets:
                  - label:
                      text: "Max Umdrehungen"
                      align: TOP_MID
                      y: 0
                      text_font: font_normal
                      text_color: 0x334455
                  - arc:
                      id: arc_rpm
                      width: 280
                      height: 280
                      align: TOP_MID
                      y: 35
                      min_value: 1
                      max_value: 20
                      value: 4           # default
                      adjustable: true
                      arc_color: 0x226622
                      arc_width: 18
                      indicator:
                        arc_color: 0x44FF88
                        arc_width: 18
                      knob:
                        bg_color: 0x44FF88
                        width: 26
                        height: 26
                        radius: 13
                      on_value:
                        - lambda: |-
                            id(sw_max_speed_rpm) = (int)x;
                            char buf[6];
                            snprintf(buf, sizeof(buf), "%d", (int)x);
                            lv_label_set_text(id(lbl_arc_rpm_val), buf);
                  - label:
                      id: lbl_arc_rpm_val
                      text: "4"
                      align: TOP_MID
                      y: 140
                      text_font: font_arc_val
                      text_color: 0x226644
                      text_align: CENTER
                  - label:
                      text: "Upm"
                      align: TOP_MID
                      y: 198
                      text_font: font_small
                      text_color: 0x556677
            # ── Start/Stop Button (mittig zwischen den Arcs) ─────────────
            - button:
                id: btn_schwenker_overlay_toggle
                width: 150
                height: 150
                align: CENTER
                y: -20
                radius: 75
                bg_color: 0x666666
                bg_opa: COVER
                border_width: 0
                shadow_width: 0
                outline_width: 0
                pad_all: 0
                on_press:
                  - lambda: |-
                      if (id(sw_aktiv)) {
                        id(script_schwenker_stop).execute();
                      } else {
                        id(script_schwenker_start).execute();
                      }
                widgets:
                  - label:
                      id: lbl_overlay_schwenker_icon
                      align: CENTER
                      text: "\uF021"
                      text_font: font_icon_xl
                      text_color: 0xFFFFFF
            # ── Preset-Buttons ──────────────────────────────────────
            # Short Click: Preset laden  |  Long Click: aktuellen Wert speichern
            - obj:
                id: row_presets
                width: 960
                height: 100
                align: BOTTOM_MID
                y: -20
                bg_opa: TRANSP
                border_width: 0
                scrollable: false
                pad_all: 0
                widgets:
                  - button:
                      id: btn_preset1
                      width: 300
                      height: 88
                      align: LEFT_MID
                      x: 10
                      bg_color: 0x223355
                      border_width: 2
                      border_color: 0x4477AA
                      radius: 12
                      widgets:
                        - label:
                            id: lbl_preset1_name
                            text: "P1"
                            align: TOP_LEFT
                            x: 14
                            y: 10
                            text_font: font_normal
                            text_color: 0xFFFFFF
                        - label:
                            id: lbl_preset1_vals
                            text: "3.2s · 4 Upm"
                            align: BOTTOM_MID
                            y: -10
                            text_font: font_small
                            text_color: 0xAABBFF
                      on_short_click:
                        - lambda: |-
                            id(sw_halbperiode_ms)  = id(preset1_hp_ms);
                            id(sw_max_speed_rpm)   = id(preset1_rpm);
                            lv_arc_set_value(id(arc_schwenkzeit), (int)(id(preset1_hp_ms) / 100));
                            lv_arc_set_value(id(arc_rpm), id(preset1_rpm));
                            char b1[8]; snprintf(b1,sizeof(b1),"%.1fs",id(preset1_hp_ms)/1000.0f);
                            lv_label_set_text(id(lbl_arc_zeit_val), b1);
                            char b2[6]; snprintf(b2,sizeof(b2),"%d",id(preset1_rpm));
                            lv_label_set_text(id(lbl_arc_rpm_val), b2);
                            ESP_LOGI("preset","P1 geladen: %u ms, %d RPM",id(preset1_hp_ms),id(preset1_rpm));
                      on_long_press:
                        - lambda: |-
                            id(preset1_hp_ms) = id(sw_halbperiode_ms);
                            id(preset1_rpm)   = id(sw_max_speed_rpm);
                            char buf[20];
                            snprintf(buf,sizeof(buf),"%.1fs \xc2\xb7 %d Upm",
                                     id(preset1_hp_ms)/1000.0f, id(preset1_rpm));
                            lv_label_set_text(id(lbl_preset1_vals), buf);
                            ESP_LOGI("preset","P1 gespeichert: %u ms, %d RPM",id(preset1_hp_ms),id(preset1_rpm));
                  - button:
                      id: btn_preset2
                      width: 300
                      height: 88
                      align: CENTER
                      bg_color: 0x223355
                      border_width: 2
                      border_color: 0x4477AA
                      radius: 12
                      widgets:
                        - label:
                            id: lbl_preset2_name
                            text: "P2"
                            align: TOP_LEFT
                            x: 14
                            y: 10
                            text_font: font_normal
                            text_color: 0xFFFFFF
                        - label:
                            id: lbl_preset2_vals
                            text: "2.0s · 8 Upm"
                            align: BOTTOM_MID
                            y: -10
                            text_font: font_small
                            text_color: 0xAABBFF
                      on_short_click:
                        - lambda: |-
                            id(sw_halbperiode_ms)  = id(preset2_hp_ms);
                            id(sw_max_speed_rpm)   = id(preset2_rpm);
                            lv_arc_set_value(id(arc_schwenkzeit), (int)(id(preset2_hp_ms) / 100));
                            lv_arc_set_value(id(arc_rpm), id(preset2_rpm));
                            char b1[8]; snprintf(b1,sizeof(b1),"%.1fs",id(preset2_hp_ms)/1000.0f);
                            lv_label_set_text(id(lbl_arc_zeit_val), b1);
                            char b2[6]; snprintf(b2,sizeof(b2),"%d",id(preset2_rpm));
                            lv_label_set_text(id(lbl_arc_rpm_val), b2);
                            ESP_LOGI("preset","P2 geladen: %u ms, %d RPM",id(preset2_hp_ms),id(preset2_rpm));
                      on_long_press:
                        - lambda: |-
                            id(preset2_hp_ms) = id(sw_halbperiode_ms);
                            id(preset2_rpm)   = id(sw_max_speed_rpm);
                            char buf[20];
                            snprintf(buf,sizeof(buf),"%.1fs \xc2\xb7 %d Upm",
                                     id(preset2_hp_ms)/1000.0f, id(preset2_rpm));
                            lv_label_set_text(id(lbl_preset2_vals), buf);
                            ESP_LOGI("preset","P2 gespeichert: %u ms, %d RPM",id(preset2_hp_ms),id(preset2_rpm));
                  - button:
                      id: btn_preset3
                      width: 300
                      height: 88
                      align: RIGHT_MID
                      x: -10
                      bg_color: 0x223355
                      border_width: 2
                      border_color: 0x4477AA
                      radius: 12
                      widgets:
                        - label:
                            id: lbl_preset3_name
                            text: "P3"
                            align: TOP_LEFT
                            x: 14
                            y: 10
                            text_font: font_normal
                            text_color: 0xFFFFFF
                        - label:
                            id: lbl_preset3_vals
                            text: "5.0s · 12 Upm"
                            align: BOTTOM_MID
                            y: -10
                            text_font: font_small
                            text_color: 0xAABBFF
                      on_short_click:
                        - lambda: |-
                            id(sw_halbperiode_ms)  = id(preset3_hp_ms);
                            id(sw_max_speed_rpm)   = id(preset3_rpm);
                            lv_arc_set_value(id(arc_schwenkzeit), (int)(id(preset3_hp_ms) / 100));
                            lv_arc_set_value(id(arc_rpm), id(preset3_rpm));
                            char b1[8]; snprintf(b1,sizeof(b1),"%.1fs",id(preset3_hp_ms)/1000.0f);
                            lv_label_set_text(id(lbl_arc_zeit_val), b1);
                            char b2[6]; snprintf(b2,sizeof(b2),"%d",id(preset3_rpm));
                            lv_label_set_text(id(lbl_arc_rpm_val), b2);
                            ESP_LOGI("preset","P3 geladen: %u ms, %d RPM",id(preset3_hp_ms),id(preset3_rpm));
                      on_long_press:
                        - lambda: |-
                            id(preset3_hp_ms) = id(sw_halbperiode_ms);
                            id(preset3_rpm)   = id(sw_max_speed_rpm);
                            char buf[20];
                            snprintf(buf,sizeof(buf),"%.1fs \xc2\xb7 %d Upm",
                                     id(preset3_hp_ms)/1000.0f, id(preset3_rpm));
                            lv_label_set_text(id(lbl_preset3_vals), buf);
                            ESP_LOGI("preset","P3 gespeichert: %u ms, %d RPM",id(preset3_hp_ms),id(preset3_rpm));

      # ================================
      - obj:
          id: overlay_schwenker_test
          width: 100%
          height: 100%
          bg_color: 0x1A0A2E
          bg_opa: 97%
          hidden: true
          clickable: true
          pad_all: 0
          scrollable: false
          widgets:
            # Titel
            - label:
                text: "Schwenker Test  \xE2\x80\x93  F4 Winkel-Modus"
                align: TOP_MID
                y: 14
                text_font: font_title
                text_color: 0xCC99FF
                text_align: CENTER

            # Exit-Button
            - button:
                id: btn_sw_test_exit
                width: 80
                height: 55
                align: TOP_RIGHT
                x: -10
                y: 10
                bg_color: 0xCC3333
                widgets:
                  - label:
                      text: "X"
                      align: CENTER
                      text_font: font_normal
                      text_color: 0xFFFFFF
                on_click:
                  - lambda: |-
                      id(script_schwenker_test_stop).execute();
                  - lvgl.widget.hide: overlay_schwenker_test

            # ── Arc-Reihe ──────────────────────────────────────────
            # Arc 1: Winkel (0–90°)
            - obj:
                id: arc_area_test_winkel
                width: 300
                height: 310
                align: TOP_LEFT
                x: 30
                y: 80
                bg_opa: TRANSP
                border_width: 0
                scrollable: false
                clickable: false
                pad_all: 0
                widgets:
                  - label:
                      text: "Winkel"
                      align: TOP_MID
                      y: 0
                      text_font: font_normal
                      text_color: 0xAA88FF
                  - arc:
                      id: arc_test_winkel
                      width: 230
                      height: 230
                      align: TOP_MID
                      y: 32
                      min_value: 1
                      max_value: 180
                      value: 20
                      adjustable: true
                      arc_color: 0x442288
                      arc_width: 18
                      indicator:
                        arc_color: 0xCC99FF
                        arc_width: 18
                      knob:
                        bg_color: 0xCC99FF
                        width: 26
                        height: 26
                        radius: 13
                      on_value:
                        - lambda: |-
                            id(sw_test_winkel) = (float)x;
                            char buf[8];
                            snprintf(buf, sizeof(buf), "%d\xc2\xb0", (int)x);
                            lv_label_set_text(id(lbl_test_winkel_val), buf);
                  - label:
                      id: lbl_test_winkel_val
                      text: "20\xc2\xb0"
                      align: TOP_MID
                      y: 118
                      text_font: font_arc_val
                      text_color: 0xCC99FF
                      text_align: CENTER

            # Arc 2: Speed (1–20 RPM)
            - obj:
                id: arc_area_test_speed
                width: 300
                height: 310
                align: TOP_MID
                x: 0
                y: 80
                bg_opa: TRANSP
                border_width: 0
                scrollable: false
                clickable: false
                pad_all: 0
                widgets:
                  - label:
                      text: "Speed"
                      align: TOP_MID
                      y: 0
                      text_font: font_normal
                      text_color: 0x88DDFF
                  - arc:
                      id: arc_test_speed
                      width: 230
                      height: 230
                      align: TOP_MID
                      y: 32
                      min_value: 1
                      max_value: 240
                      value: 5
                      adjustable: true
                      arc_color: 0x113355
                      arc_width: 18
                      indicator:
                        arc_color: 0x55CCFF
                        arc_width: 18
                      knob:
                        bg_color: 0x55CCFF
                        width: 26
                        height: 26
                        radius: 13
                      on_value:
                        - lambda: |-
                            id(sw_test_speed) = (int)x;
                            char buf[8];
                            snprintf(buf, sizeof(buf), "%d", (int)x);
                            lv_label_set_text(id(lbl_test_speed_val), buf);
                  - label:
                      id: lbl_test_speed_val
                      text: "5"
                      align: TOP_MID
                      y: 118
                      text_font: font_arc_val
                      text_color: 0x55CCFF
                      text_align: CENTER
                  - label:
                      text: "Upm"
                      align: TOP_MID
                      y: 172
                      text_font: font_small
                      text_color: 0x5588AA

            # Arc 3: Acc (10–250 in 10er-Schritten → arc 1–25)
            - obj:
                id: arc_area_test_acc
                width: 300
                height: 310
                align: TOP_RIGHT
                x: -30
                y: 80
                bg_opa: TRANSP
                border_width: 0
                scrollable: false
                clickable: false
                pad_all: 0
                widgets:
                  - label:
                      text: "Acc"
                      align: TOP_MID
                      y: 0
                      text_font: font_normal
                      text_color: 0xFFCC55
                  - arc:
                      id: arc_test_acc
                      width: 230
                      height: 230
                      align: TOP_MID
                      y: 32
                      min_value: 1       # × 5 = 5
                      max_value: 50      # × 5 = 250
                      value: 10          # × 5 = 50 (default)
                      adjustable: true
                      arc_color: 0x332200
                      arc_width: 18
                      indicator:
                        arc_color: 0xFFAA22
                        arc_width: 18
                      knob:
                        bg_color: 0xFFAA22
                        width: 26
                        height: 26
                        radius: 13
                      on_value:
                        - lambda: |-
                            id(sw_test_acc) = (int)x * 5;
                            char buf[8];
                            snprintf(buf, sizeof(buf), "%d", (int)x * 5);
                            lv_label_set_text(id(lbl_test_acc_val), buf);
                  - label:
                      id: lbl_test_acc_val
                      text: "50"
                      align: TOP_MID
                      y: 118
                      text_font: font_arc_val
                      text_color: 0xFFAA22
                      text_align: CENTER

            # ── Start/Stop-Button (mittig unten) ──────────────────
            - button:
                id: btn_sw_test_toggle
                width: 280
                height: 80
                align: BOTTOM_MID
                y: -20
                radius: 15
                bg_color: 0x444444
                border_width: 2
                border_color: 0x888888
                widgets:
                  - label:
                      id: lbl_sw_test_toggle
                      text: "TEST"
                      align: CENTER
                      text_font: font_normal
                      text_color: 0xFFFFFF
                on_click:
                  - lambda: |-
                      if (id(sw_test_aktiv)) {
                        id(script_schwenker_test_stop).execute();
                      } else {
                        id(script_schwenker_test_start).execute();
                      }

      # ================================
      - obj:
          id: overlay_sensorphalanx
          width: 100%
          height: 100%
          bg_color: 0xFFFFFF
          bg_opa: 93%
          hidden: true
          clickable: true
          pad_all: 0
          scrollable: false
          widgets:
            # Titel
            - label:
                id: lbl_sensorphalanx_title
                text: "Sensor-Phalanx"
                align: TOP_MID
                y: 12
                text_font: font_title
                text_color: 0x003366
                text_align: CENTER

            # Exit-Button
            - button:
                id: btn_sensorphalanx_exit
                width: 80
                height: 55
                align: TOP_RIGHT
                x: -10
                y: 10
                bg_color: 0xCC3333
                widgets:
                  - label:
                      text: "X"
                      align: CENTER
                      text_font: font_normal
                      text_color: 0xFFFFFF
                on_click:
                  - lvgl.widget.hide: overlay_sensorphalanx

            # ── Zeile 1: VL53L1X Distanz ──────────────────────────
            - obj:
                id: row_sp_tof
                width: 990
                height: 65
                align: TOP_LEFT
                x: 15
                y: 82
                bg_color: 0xF0F4F8
                border_width: 0
                radius: 10
                scrollable: false
                widgets:
                  - obj:
                      id: badge_sp_tof
                      width: 72
                      height: 53
                      align: LEFT_MID
                      x: 6
                      bg_color: 0x2255CC
                      radius: 8
                      border_width: 0
                      scrollable: false
                      widgets:
                        - label:
                            text: "\uF545"
                            align: CENTER
                            text_font: font_icons
                            text_color: 0xFFFFFF
                  - label:
                      text: "Distanz"
                      align: LEFT_MID
                      x: 90
                      text_font: font_normal
                      text_color: 0x000000
                  - label:
                      text: "Time-of-Flight · VL53L1X · 50–4000 mm"
                      align: LEFT_MID
                      x: 380
                      text_font: font_small
                      text_color: 0x555555
                  - label:
                      id: distance_value_label
                      text: !lambda |-
                        if (isnan(id(distance_sensor).state)) return std::string("---");
                        char b[12];
                        snprintf(b, sizeof(b), "%.0fmm", id(distance_sensor).state);
