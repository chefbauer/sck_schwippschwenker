globals:
  - id: v_energy_idle
    type: float
    restore_value: no
    initial_value: '0.0'


canbus:
  - platform: esp32_can
    tx_pin: ${pin_can_tx_pin}
    rx_pin: ${pin_can_rx_pin}
    id: can_bus
    bit_rate: 500KBPS     #500KBPS
    can_id: ${master_can_id}

    use_extended_id: false

    on_frame:
      - can_id: ${motor_can_id}
        use_extended_id: false
        then:
        - lambda: |-
            // if (${role_id} != "master")  // Nur als Master verarbeite CAN Pakete!
            // {
            //   return;
            // }
            std::string b(x.begin(), x.end());
            unsigned int command = x[0];
            unsigned int p1 = x[1];
            static float millis_start = millis();
            if (command == 0x30)
            {
              // Verarbeite Winkel
              // Wert 30 = 0-16384 + Carry Bit! ich brauch aber nur 5+6.
              int position = x[5]*256 + x[6]; 
              float position_degree = 360/16384.0 * position;
              ESP_LOGD("candump_30", "Winkel: %.2f ° | Raw: %i", position_degree, position);
              id(sensor_motor_position).publish_state(position);
            }
            else if (command == 0x31)
            {
              // 31 = Position Addition Axis
              // Byte []1-[]6!
              long int position = x[1]*std::pow(256, 5) + x[2]*std::pow(256, 4) + x[3]*std::pow(256, 3) + x[4]*std::pow(256, 2) +  x[5]*256 + x[6]; 
              if (position >= std::pow(256, 6) / 2.0)
              {
                  position = -1 * std::pow(256, 6) - position;
              }
              ESP_LOGD("candump_31", "Pos. ABS Axis: %.li", position);
              id(sensor_motor_position_abs_axis).publish_state(position);
            }
            else if (command == 0x32)
            {
              // 32 = RT Speed
              // Byte []1-[]2!
              int32_t speed_rpm = (static_cast<int32_t>(x[1]) << 8) |
                                      static_cast<uint32_t>(x[2]);
              
              ESP_LOGI("candump_39", "Motor RPM: %i", speed_rpm);
              // id(sensor_motor_position_error).publish_state(position_error);
            }
            else if (command == 0x39)
            {
              // 39 = Motor Winkel Error
              // Byte []1-[]4!
              // float position_error = x[1]*std::pow(256, 3) + x[2]*std::pow(256, 2) + x[3]*256 + x[4]; 
              int32_t position_error_raw = (static_cast<int32_t>(x[1]) << 24) |
                                    (static_cast<uint32_t>(x[2]) << 16) |
                                    (static_cast<uint32_t>(x[3]) << 8)  |
                                      static_cast<uint32_t>(x[4]);
              float position_error = position_error_raw / 51200.0 * 360.0;
              
              ESP_LOGI("candump 39", "Pos. Error: %.2f° | Raw: %i", position_error, position_error_raw);
              id(sensor_motor_position_error).publish_state(position_error);
              // ESP_LOGI("candump 39", "%x : %x %x %x %x %x %x %x %x", can_id, int(x[0]), int(x[1]), int(x[2]), int(x[3]), int(x[4]), int(x[5]), int(x[6]), int(x[7])); //1FD047FF   [8]  01 42 32 00 92 E2 00 FF
            }
            else if (command == 0xF6)  // F6 = Motorbetrieb Speed Mode
            {
              if (p1 == 2) //run_completed
              {
                id(script_Motor_Nullstellung_VIERTEL).execute();
              }
              id(script_motor_get_status).execute();
            }
            else if (command == 0xF4 || command == 0xFD)  // F4 = Relativ Winkel, FD = relative Pulse
            {
              if (p1 == 1) //run_start
              {
                millis_start = millis();
                ESP_LOGI("candump Re", "Motor Mode: %02X | Status: %i", command, p1);
              }
              if (p1 == 2) //run_completed
              {
                id(sensor_motor_status).publish_state(2.0);
                ESP_LOGI("candump Re", "Motor Mode: %02X | Status: %i | Runtime (ms): %f.2" , command, p1, millis() - millis_start);
              }
              // id(script_motor_get_status).execute(); # direkt setzen ist besser. F1 funktioniert trotzdem.
            }
            else if (command == 0xF1)  // F1 = Status
            {
              id(sensor_motor_status).publish_state(p1);
              ESP_LOGI("candump F1", "Motor Status: %i", p1);
              if (p1 == 1) // Stopp!
              {
                id(script_motor_get_winkel).execute();
              }
            }
            else
            {
                ESP_LOGI("candump Motor", "Motor Mode: %02X | Status: %i", command, p1);
            }
      # - can_id: 1
      #   use_extended_id: false
      #   then:
      #   - lambda: |-
      #       std::string b(x.begin(), x.end());
      #       ESP_LOGD("can id 3", "%s", &b[0] );
      #### to debug only and find can_id
      # - can_id: 0  # listen to all messages
      #   can_id_mask: 0
      #   use_extended_id: false
      #   then:
      #   - lambda: |-
      #         ESP_LOGI("candump", "%x : %x %x %x %x %x %x %x %x", can_id, int(x[0]), int(x[1]), int(x[2]), int(x[3]), int(x[4]), int(x[5]), int(x[6]), int(x[7])); //1FD047FF   [8]  01 42 32 00 92 E2 00 FF

script:
  - id: script_motor_set_zero
    then:
      - lambda: |-
          std::vector<unsigned char> data = add_crc(${motor_can_id}, { 0x92 }); // zusammenfassen geht ned!
          id(can_bus)->send_data(${motor_can_id}, false, data);  // SET Zero
      - script.stop: script_motor_set_zero  # Self-Kill

  - id: script_motor_set_respond_on
    then:
      # - script.execute: script_motor_set_respond_off
      # - delay: 1ms
      - lambda: |-
          std::vector<unsigned char> data = add_crc(${motor_can_id}, { 0x8C, 0x01, 0x01 }); // zusammenfassen geht ned!
          id(can_bus)->send_data(${motor_can_id}, false, data);  // GET Status
      - script.stop: script_motor_set_respond_on  # Self-Kill

  - id: script_motor_set_respond_off
    then:
      - lambda: |-
          std::vector<unsigned char> data = add_crc(${motor_can_id}, { 0x8C, 0, 0 }); // zusammenfassen geht ned!
          id(can_bus)->send_data(${motor_can_id}, false, data);  // GET Status
      - script.stop: script_motor_set_respond_off  # Self-Kill

    # MOTOR STROMBEGRENZUNG
  - id: script_motor_set_work_current_mA
    parameters:
      current_mA: int
    then:
      - lambda: |-
          current_mA = min(3000, current_mA);   // Grenze 3A jaja min max. alter.
          unsigned char current_mA_h = current_mA / 256;
          unsigned char current_mA_l = current_mA % 256;
          std::vector<unsigned char> data = add_crc(${motor_can_id}, { 0x83, current_mA_h, current_mA_l }); // set current mA
          id(can_bus)->send_data(${motor_can_id}, false, data);  // Send
      - script.stop: script_motor_set_work_current_mA

    # MOTOR STROMBEGRENZUNG
  - id: script_motor_set_idle_current_perc
    parameters:
      current_perc: int
    then:
      - lambda: |-
          current_perc = max(10, current_perc);   // Grenze 10%
          current_perc = min(90, current_perc);   // Grenze 90%
          unsigned char current_param = (int) round(current_perc / 10.0 - 1.0); // 0-8
          std::vector<unsigned char> data = add_crc(${motor_can_id}, { 0x9B, current_param }); // set idle current perc
          id(can_bus)->send_data(${motor_can_id}, false, data);  // Send
      - script.stop: script_motor_set_idle_current_perc

  - id: script_motor_get_status
    then:
      # - lambda: |-
      #     std::vector<unsigned char> data = add_crc(${motor_can_id}, { 0xF1 }); // zusammenfassen geht ned!
      #     id(can_bus)->send_data(${motor_can_id}, false, data);  // GET Status
      - lambda: !lambda id(can_bus)->send_data(${motor_can_id}, false, add_crc(${motor_can_id}, { 0xF1 })); // State
      - script.stop: script_motor_get_status  # Self-Kill

  - id: script_motor_get_winkel
    then:
      #- delay: 100ms
      # - lambda: |-
      #     std::vector<unsigned char> data = add_crc(${motor_can_id}, { 0x30 }); // zusammenfassen geht ned!
      #     id(can_bus)->send_data(${motor_can_id}, false, data);  // GET Winkel
      - lambda: !lambda id(can_bus)->send_data(${motor_can_id}, false, add_crc(${motor_can_id}, { 0x30 })); // Get Winkel
      - lambda: !lambda id(can_bus)->send_data(${motor_can_id}, false, add_crc(${motor_can_id}, { 0x39 })); // Pos. Error
      - script.stop: script_motor_get_winkel  # Self-Kill

  - id: script_motor_get_pos_abs_axis
    then:
      - lambda: |-
          std::vector<unsigned char> data = add_crc(${motor_can_id}, { 0x31 }); // zusammenfassen geht ned!
          id(can_bus)->send_data(${motor_can_id}, false, data);  // GET POS ABS AXIS

  - id: script_motor_set_default
    then:
      - lambda: |-
          std::vector<unsigned char> data;
          // data = add_crc(${motor_can_id}, { 0x8C, 0x01, 0x01 }); // SET RESPONSE 1+1
          // id(can_bus)->send_data(${motor_can_id}, false, data);  // Send
          data = add_crc(${motor_can_id}, { 0x89, 0x01 }); // MPLYER ON/OFF 0/1
          id(can_bus)->send_data(${motor_can_id}, false, data);  // Send

          data = add_crc(${motor_can_id}, { 0x84, 0x40 }); // MSTEP 40=64 :) 20 = 32?
          id(can_bus)->send_data(${motor_can_id}, false, data);  // Send
          data = add_crc(${motor_can_id}, { 0x82, 0x05 }); // MODE SET FOC und guter Motorbetrieb! Stromsparen! 4 = closed loop, 5 = FOC.
          id(can_bus)->send_data(${motor_can_id}, false, data);  // Send

          // // RESPOND ON:
          // data = add_crc(${motor_can_id}, { 0x8C, 1, 1 }); // zusammenfassen geht ned!
          // id(can_bus)->send_data(${motor_can_id}, false, data);  // GET Status

      - script.execute: 
          id: script_motor_set_work_current_mA
          current_mA: 800
          
      - script.execute: script_motor_set_respond_on
          

  - id: script_motor_set_cl_Steps
    parameters:
      steps: int
    then:
      - lambda: |-
          std::vector<unsigned char> data = add_crc(${motor_can_id}, { 0x82, 0x04 }); // MODE CLOSED LOOP RUCKELFREI
          id(can_bus)->send_data(${motor_can_id}, false, data);  // Send
          data = add_crc(${motor_can_id}, { 0x84, (unsigned char)steps }); // Steps Variabel :) geht in int und in hex. geil.
          id(can_bus)->send_data(${motor_can_id}, false, data);  // Send

    # MOTOR GAAAAS :)
  - id: script_motor_set_speed
    parameters:
      speed_rpm: int
      accel: int
    then:
      #- script.execute: script_motor_set_default
      - lambda: |-
          id(dreher_auswurfstellung).publish_state(false);
          std::vector<unsigned char> data = gen_data_can_motor_set_speed(${motor_can_id}, ${c_motor_direction}, speed_rpm, accel);
          id(can_bus)->send_data(${motor_can_id}, false, data);  // Send
      - script.stop: script_motor_set_speed

    # MOTOR GAAAAS :)
  - id: script_motor_set_speed_dir
    parameters:
      speed_rpm: int
      accel: int
      dir: int
    then:
      #- script.execute: script_motor_set_default
      - lambda: |-
          id(dreher_auswurfstellung).publish_state(false);
          std::vector<unsigned char> data = gen_data_can_motor_set_speed(${motor_can_id}, dir, speed_rpm, accel);
          id(can_bus)->send_data(${motor_can_id}, false, data);  // Send
      - script.stop: script_motor_set_speed_dir

    # POS ABS AXIS
  - id: script_motor_goto_position_abs_axis
    parameters:
      speed_rpm: int
      accel: int
      pos: int
    then:
      - lambda: |-
          id(dreher_auswurfstellung).publish_state(false);
          std::vector<unsigned char> data = gen_data_can_motor_goto_abs_axis(${motor_can_id}, speed_rpm, accel, pos);
          id(can_bus)->send_data(${motor_can_id}, false, data);  // Send

    # POS ABS AXIS
  - id: script_motor_goto_position_abs_axis_degree
    parameters:
      speed_rpm: int
      accel: int
      pos_degree: float
    then:
      - lambda: |-
          std::vector<unsigned char> data = gen_data_can_motor_goto_abs_axis_degree(${motor_can_id}, speed_rpm, accel, pos_degree);
          id(can_bus)->send_data(${motor_can_id}, false, data);  // Send




  - id: script_Motor_Nullstellung_DRITTEL
    then:
      - lambda: |-
          //id(can_bus)->send_data(${motor_can_id}, false, add_crc(${motor_can_id}, { 0x82, 0x04 }));  // MODE CLOSED LOOP RUCKELFREI
          std::vector<unsigned char> data = add_crc(${motor_can_id}, { 0x82, 0x04 }); // MODE CLOSED LOOP RUCKELFREI
          id(can_bus)->send_data(${motor_can_id}, false, data);  // Send

      - script.execute: script_motor_get_winkel
      - delay: 150ms
      - lambda: |-
          unsigned char npr_hh = 0;
          unsigned char npr_h = 0;
          unsigned char npr_l = 0;
          int v_sensor_motor_position = id(sensor_motor_position).state;
          int v_new_position_relative = 16383 - v_sensor_motor_position - (int) ((16383 -v_sensor_motor_position) / 5461.0) * 5461; // ich will positive werte! ev. kann ich hier dann 1/3...
          if (v_new_position_relative > (5461.0 / 2.0))
          {
            int v_new_position_relative_negative = 0xFFFFFF - 5461 + v_new_position_relative;
            npr_hh = v_new_position_relative_negative / 256 / 256;
            npr_h = v_new_position_relative_negative / 256;
            npr_l = v_new_position_relative_negative % 256;
          }
          else
          {
            npr_hh = 0;
            npr_h = v_new_position_relative / 256;
            npr_l = v_new_position_relative % 256;
          }
          //GOTO RELATIVE POSITION speed 10, gas 01
          id(can_bus)->send_data(${motor_can_id}, false, add_crc(${motor_can_id}, { 0x84, 0x80 }));  // MSTEP 255 :)
          id(can_bus)->send_data(${motor_can_id}, false, add_crc(${motor_can_id}, { 0xF4, 0x00, 0xFF, 0x05, npr_hh, npr_h, npr_l })); // F4 relative ° 80/5 war gut
      - script.execute: script_motor_get_status
      - delay: 250ms
      - while:
          condition:
            lambda: |-
              return id(sensor_motor_status).state != 1;  
          then: 
            - delay: 250ms
            - script.execute: script_motor_get_status
      - lambda: |-
          //id(can_bus)->send_data(${motor_can_id}, false, add_crc(${motor_can_id}, { 0x82, 0x05 }));  // MODE FOC

  - id: script_Motor_Nullstellung_VIERTEL
    then:
      - lambda: |-
          //id(can_bus)->send_data(${motor_can_id}, false, add_crc(${motor_can_id}, { 0x82, 0x04 }));  // MODE CLOSED LOOP RUCKELFREI
          std::vector<unsigned char> data = add_crc(${motor_can_id}, { 0x82, 0x04 }); // MODE CLOSED LOOP RUCKELFREI
          id(can_bus)->send_data(${motor_can_id}, false, data);  // Send

      - script.execute: script_motor_get_winkel
      - delay: 150ms
      - lambda: |-
          unsigned char npr_hh = 0;
          unsigned char npr_h = 0;
          unsigned char npr_l = 0;
          int v_sensor_motor_position = id(sensor_motor_position).state;
          int v_new_position_relative = 16383 - v_sensor_motor_position - (int) ((16383 -v_sensor_motor_position) / 4096.0) * 4096; // ich will positive werte! ev. kann ich hier dann 1/3...
          if (v_new_position_relative > (4096.0 / 2.0))
          {
            int v_new_position_relative_negative = 0xFFFFFF - 4096 + v_new_position_relative;
            npr_hh = v_new_position_relative_negative / 256 / 256;
            npr_h = v_new_position_relative_negative / 256;
            npr_l = v_new_position_relative_negative % 256;
          }
          else
          {
            npr_hh = 0;
            npr_h = v_new_position_relative / 256;
            npr_l = v_new_position_relative % 256;
          }
          //GOTO RELATIVE POSITION speed 10, gas 01
          id(can_bus)->send_data(${motor_can_id}, false, add_crc(${motor_can_id}, { 0x84, 0x80 }));  // MSTEP 255 :)
          id(can_bus)->send_data(${motor_can_id}, false, add_crc(${motor_can_id}, { 0xF4, 0x00, 0xFF, 0x05, npr_hh, npr_h, npr_l })); // F4 relative ° 80/5 war gut
      - script.execute: script_motor_get_status
      - delay: 250ms
      - while:
          condition:
            lambda: |-
              return id(sensor_motor_status).state != 1;  
          then: 
            - delay: 250ms
            - script.execute: script_motor_get_status
      - lambda: |-
          //id(can_bus)->send_data(${motor_can_id}, false, add_crc(${motor_can_id}, { 0x82, 0x05 }));  // MODE FOC


  - id: script_Button_Motor_Nullstellung
    then:
      - script.execute: script_motor_get_winkel
      - delay: 150ms
      - lambda: |-
          uint32_t 	can_id = 3;
          bool 	use_extended_id = 0;
          int v_sensor_motor_position = id(sensor_motor_position).state;
          int v_new_position_relative = 16383 - v_sensor_motor_position; // ich will positive werte! ev. kann ich hier dann 1/3...
          unsigned char npr_h = v_new_position_relative / 256;
          unsigned char npr_l = v_new_position_relative % 256;
          //GOTO RELATIVE POSITION speed 10, gas 01
          std::vector< uint8_t > data = add_crc(can_id, { 0xF4, 0x00, 0xFF, 0x02, 0x00, npr_h, npr_l });
          id(can_bus)->send_data(can_id, use_extended_id, data);

  - id: script_change_can_id_9_to_motor_can_id
    then:
      - lambda: |-
          uint32_t 	can_id = 9;  // Motor auf 9, dann  ${motor_can_id}
          bool 	use_extended_id = 0;
          unsigned char can_id_h = 0;
          unsigned char can_id_l = ${motor_can_id};
          std::vector< uint8_t > data = add_crc(can_id, { 0x8B, 0x00, can_id_l });
          id(can_bus)->send_data(can_id, use_extended_id, data);

      - delay: 100ms
      # # Schritt 2: Stelle Arbeitsstrom auf 800 mA ein
      # - lambda: |-
      #     uint32_t can_id = ${motor_can_id};  // Neue CAN-ID des Motors
      #     bool use_extended_id = 0;
      #     unsigned char current_h = 0x03;  // High-Byte von 800 (0x0320)
      #     unsigned char current_l = 0x20;  // Low-Byte von 800 (0x0320)
      #     std::vector<uint8_t> data = add_crc(can_id, {0xA3, 0x00, current_h, current_l});    // ?????
      #     id(can_bus)->send_data(can_id,z.B. use_extended_id, data);

      - script.execute:
          id: script_motor_set_work_current_mA
          current_mA: 800 

      - delay: 100ms

      # Schritt 3: Stelle Idle-Strom auf 10% ein
      - script.execute:
          id: script_motor_set_idle_current_perc
          current_perc: 10 

      # - lambda: |-
      #     uint32_t can_id = ${motor_can_id};
      #     bool use_extended_id = 0;
      #     unsigned char idle_percent = 0x0A;  // 10% = 0x0A
      #     std::vector<uint8_t> data = add_crc(can_id, {0xA4, 0x00, idle_percent});
      #     id(can_bus)->send_data(can_id, use_extended_id, data);

  - id: script_motor_goto_relative_degree
    parameters:
      speed_rpm: int
      accel: int
      degree_rel: float
    then:
      # - lambda: |-
      #     //id(can_bus)->send_data(${motor_can_id}, false, add_crc(${motor_can_id}, { 0x82, 0x04 }));  // MODE CLOSED LOOP RUCKELFREI
      #     std::vector<unsigned char> data = add_crc(${motor_can_id}, { 0x82, 0x04 }); // MODE CLOSED LOOP RUCKELFREI
      #     id(can_bus)->send_data(${motor_can_id}, false, data);  // Send
      - lambda: |-
          unsigned char speed_h = speed_rpm / 256;
          unsigned char speed_l = speed_rpm % 256;
          unsigned char accel_l = accel;
          // unsigned char npr_hh = 0;
          // unsigned char npr_h = 0;
          // unsigned char npr_l = 0;
          // int v_new_position_relative = 16383/360.0 * degree_rel;
          // if (v_new_position_relative < 0)
          // {
          //   int v_new_position_relative_negative = 0xFFFFFF - v_new_position_relative;
          //   npr_hh = v_new_position_relative_negative / 256 / 256;
          //   npr_h = v_new_position_relative_negative / 256;
          //   npr_l = v_new_position_relative_negative % 256;
          // }
          // else
          // {
          //   npr_hh = 0;
          //   npr_h = v_new_position_relative / 256;
          //   npr_l = v_new_position_relative % 256;
          // }
          double steps_double = (16384.0 / 360.0) * degree_rel;   // exakte Umrechnung
          int32_t steps = lround(steps_double);                   // beste Rundung auf ganze Schritte

          // In signed 24-Bit Two's Complement umwandeln (einfach casten und maskieren)
          uint32_t val_24bit = static_cast<uint32_t>(static_cast<int32_t>(steps)) & 0xFFFFFF;

          // Bytes extrahieren (Big-Endian, wie beim Servo42D üblich)
          uint8_t npr_hh = (val_24bit >> 16) & 0xFF;   // höchstes Byte
          uint8_t npr_h  = (val_24bit >>  8) & 0xFF;   // mittleres Byte
          uint8_t npr_l  =  val_24bit        & 0xFF;   // niedrigstes Byte

          //GOTO RELATIVE POSITION Degree
          id(can_bus)->send_data(${motor_can_id}, false, add_crc(${motor_can_id}, { 0xF4, speed_h, speed_l, accel_l, npr_hh, npr_h, npr_l })); // F4 relative °
      - script.execute: script_motor_get_status
      - delay: 250ms
      - while:
          condition:
            lambda: |-
              return id(sensor_motor_status).state != 1;  
          then: 
            - delay: 250ms
            - script.execute: script_motor_get_status
      - lambda: |-
          //id(can_bus)->send_data(${motor_can_id}, false, add_crc(${motor_can_id}, { 0x82, 0x05 }));  // MODE FOC




button:
  - platform: template
    name: "Button_Motor_Calibrate"
    id: Button_Motor_Calibrate
    on_press:
      - lambda: !lambda |-
          std::vector< uint8_t > data = add_crc(${motor_can_id}, { 0x80, 0x00 }); // Calibrate
          id(can_bus)->send_data(${motor_can_id}, false, data);  // Send

  - platform: template
    name: "Button_Motor_Setze_0°"
    id: Button_Motor_Setze_0
    on_press:
      - script.execute: script_motor_set_zero

  - platform: template
    name: "Button_Motor_Status_Update"
    id: Button_Motor_Status_Update
