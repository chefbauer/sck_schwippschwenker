# ── Komponenten ──────────────────────────────────────────────────────────────────
#  substitutions:  pin_i2c_scl, pin_i2c_sda, pin_can_rx_pin, pin_can_tx_pin,
#                  pin_pwm1..4, pin_led_h1, pin_led_h2, pin_led_v1, pin_led_v2,
#                  pin_1w, fan_kompressor_min_perc, fan_kompressor_max_perc,
#                  master_can_id, motor_can_id, c_motor_direction,
#                  c_pumpe_umwaelzung_ein_perc
# ─────────────────────────────────────────────────────────────────────────────────

substitutions:
  # PINS
  pin_i2c_scl: GPIO8
  pin_i2c_sda: GPIO7
  pin_can_rx_pin: GPIO32  # Board 7
  pin_can_tx_pin: GPIO33  # Board 8
  pin_pwm1: GPIO1
  pin_pwm2: GPIO2
  pin_pwm3: GPIO3
  pin_pwm4: GPIO4
  pin_led_h1: GPIO5
  pin_led_h2: GPIO20
  pin_led_v1: GPIO47
  pin_led_v2: GPIO46
  pin_1w: GPIO45
  
  fan_kompressor_min_perc: 25
  fan_kompressor_max_perc: 92

  master_can_id: "1"
  motor_can_id: "3"
  c_motor_direction: "1"    # 0 = links, 1 = rechts motor => welle

  
  c_pumpe_umwaelzung_ein_perc: 30
  #c_pumpe_standby_perc: 30
