# ============================================================
# Schwenker – Sinus-Pendelbewegung via F5 (MKS Servo42D CAN)
# ============================================================
#
# Prinzip: "Fernes-Ziel + Echtzeit-F5-Updates"
#
#   F5 (Positionsmodus 4) unterstützt Echtzeit-Updates laut offizieller Doku.
#   Der Motor bekommt alle 50 ms ein neues F5-Kommando:
#
#     target = sw_richtung × 8.000.000  (festes Ziel weit weg, ±max int24_t)
#     speed  = sw_max_speed_rpm × sin(π × t / T_half)
#
#   → 0 → max → 0 über jede Halbperiode = ruckfreie Sinus-Hüllkurve
#   → Motor fährt immer "in Richtung Unendlich" – erreicht Ziel nie in 50 ms
#   → Am Wendepunkt (sin ≈ 0): Richtung invertieren, Phase zurück auf 0
#   → Kein Positions-Feedback nötig, kein Start-Delay
#
# F5-Format (verifiziert, offizielle Doku):
#   { 0xF5, spd_H, spd_L, acc, pos_HH, pos_H, pos_L } + CRC
#   speed:   0–3000 RPM  (2 Byte)
#   acc:     0 oder 255 = kein internes Ramping (sofortige Sprünge → Ruck!)
#            1–254      = Motor interpoliert intern zwischen Geschwindigkeitsstufen
#   → Wir nutzen ~200: Sinus gibt die Makro-Kurve, Motor glättet die 50ms-Stufen
#   absAxis: int24_t, −8388607 … +8388607  (3 Byte Two's Complement)
#   Beispiel offiz. Doku: F5 02 58 02 00 40 00 → pos=0x4000, speed=600, acc=2
#
# Parameter (Globals, können per HA / API zur Laufzeit geändert werden):
#   sw_halbperiode_ms :  Zeit pro Richtung in ms  (default: 3000 ms)
#   sw_max_speed_rpm  :  Spitzengeschwindigkeit   (default: 10 RPM)
#
# ============================================================

globals:
  # ── Laufzustand ──────────────────────────────────────────
  - id: sw_aktiv
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: sw_richtung
    type: int
    restore_value: no
    initial_value: '1'          # +1 = Richtung CW, -1 = CCW

  - id: sw_phase_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'          # Fortschritt innerhalb der aktuellen Halbperiode

  # ── Konfiguration (änderbar im Betrieb) ──────────────────
  - id: sw_halbperiode_ms
    type: uint32_t
    restore_value: yes
    initial_value: '3000'       # 3 s pro Richtung

  - id: sw_max_speed_rpm
    type: int
    restore_value: yes
    initial_value: '15'         # RPM am Sinus-Scheitel

  - id: sw_acc
    type: int
    restore_value: yes
    initial_value: '200'        # 1–254: Motor interpoliert intern (glättet 50ms-Stufen)
                                # 0 oder 255: kein internes Ramping → Ruck bei Stufen!

  - id: slider_trim_last       # merkt sich den letzten Slider-Wert für Delta-Berechnung
    type: int
    restore_value: no
    initial_value: '0'

# ============================================================
# Scripts
# ============================================================
script:
  # ── Starten ──────────────────────────────────────────────
  - id: script_schwenker_start
    mode: single              # mehrfaches Aufrufen ignoriert
    then:
      # Motor-Init: Closed Loop Mode 4, 64 Subdivisions, 2000 mA, 5% Standby
      - lambda: |-
          std::vector<unsigned char> data;
          data = add_crc(${motor_can_id}, { 0x82, 0x04 });        // MODE: Closed Loop
          id(can_bus)->send_data(${motor_can_id}, false, data);
          data = add_crc(${motor_can_id}, { 0x84, 0x40 });        // MSTEP: 64 subdivisions
          id(can_bus)->send_data(${motor_can_id}, false, data);
          data = add_crc(${motor_can_id}, { 0x83, 0x07, 0xD0 });  // Work current: 2000 mA
          id(can_bus)->send_data(${motor_can_id}, false, data);
          data = add_crc(${motor_can_id}, { 0x9B, 0x00 });        // Idle current: param 0 = min (~10%)
          id(can_bus)->send_data(${motor_can_id}, false, data);
      - delay: 50ms
      - lambda: |-
          id(sw_phase_ms)  = 0;
          id(sw_richtung)  = 1;   // immer mit Rechtsdrehung (CW) starten
          id(sw_aktiv)     = true;
          ESP_LOGI("schwenker", "START  halbperiode=%u ms  max=%d RPM",
                   id(sw_halbperiode_ms), id(sw_max_speed_rpm));
          lv_obj_set_style_bg_color(id(btn_schwenker_main), lv_color_hex(0x229933), 0);

  # ── Stoppen ───────────────────────────────────────────────
  - id: script_schwenker_stop
    mode: single
    then:
      - lambda: |-
          id(sw_aktiv) = false;
          lv_obj_set_style_bg_color(id(btn_schwenker_main), lv_color_hex(0x666666), 0);
          ESP_LOGI("schwenker", "STOP");
          // Mode 5 = FOC → kein Haltestrom im Stillstand
          id(can_bus)->send_data(${motor_can_id}, false, add_crc(${motor_can_id}, { 0x82, 0x05 }));
          // F5 speed=0 an aktuellem Ziel → Motor bremst und stoppt
          uint8_t acc   = (uint8_t)id(sw_acc);
          int32_t target = (int32_t)(id(sw_richtung)) * 8000000;
          uint32_t val  = (uint32_t)(target) & 0x00FFFFFFU;
          uint8_t p_hh  = (uint8_t)((val >> 16) & 0xFF);
          uint8_t p_h   = (uint8_t)((val >>  8) & 0xFF);
          uint8_t p_l   = (uint8_t)( val         & 0xFF);
          id(can_bus)->send_data(${motor_can_id}, false,
              add_crc(${motor_can_id}, { 0xF5, 0x00, 0x00, acc, p_hh, p_h, p_l }));
      - delay: 300ms
      - script.execute:
          id: script_motor_set_work_current_mA
          current_mA: 500   # nach Stopp: geringer Haltestrom → Motor drehbar, aber nicht frei
      - script.execute:
          id: script_motor_set_idle_current_perc
          current_perc: 10

  # ── Schwenker fährt zu einem der 6 Slot-Positionen ───────
  #   Slot 1 = 0°, Slot 2 = 60°, Slot 3 = 120°,
  #   Slot 4 = 180°, Slot 5 = 240°, Slot 6 = 300°
  - id: script_schwenker_goto_slot
    parameters:
      slot: int
    then:
      # Aktuelle Position frisch abrufen
      - lambda: |-
          id(can_bus)->send_data(${motor_can_id}, false, add_crc(${motor_can_id}, { 0x30 }));
      - delay: 100ms
      # Relative Fahrt zur Zielposition
      - lambda: |-
          float current_raw = id(sensor_motor_position).state;
          if (isnan(current_raw)) {
            ESP_LOGW("schwenker", "goto_slot: sensor_motor_position NaN – Abbruch");
            return;
          }
          float current_deg = current_raw / 16384.0f * 360.0f;
          float target_deg  = (float)(slot - 1) * 60.0f;  // 1=0°, 2=60° …6=300°
          float rel         = target_deg - current_deg;
          // Kürzesten Weg wählen (±180°)
          while (rel >  180.0f) rel -= 360.0f;
          while (rel < -180.0f) rel += 360.0f;
          ESP_LOGI("schwenker", "goto_slot %d  target=%.1f°  aktuell=%.1f°  rel=%.1f°",
                   slot, target_deg, current_deg, rel);
          // 8 RPM + acc 50: langsam und sanft im Wasser
          id(script_motor_goto_relative_degree)->execute(8, 50, rel);
      # Wartezeit: lange genug für die Fahrt (max. Weg ≈ 180° bei 8 RPM ≈ ~4 s)
      - delay: 5000ms
      - lambda: |-
          // Nach der Fahrt: Arbeitsstrom reduzieren, FOC-Modus
          id(can_bus)->send_data(${motor_can_id}, false,
              add_crc(${motor_can_id}, { 0x82, 0x05 }));

  # ── Motor Soft-Reboot (Soll = Ist, manuell aus Einstellungen) ──────────
  - id: script_motor_reboot
    mode: single
    then:
      - lambda: |-
          ESP_LOGI("schwenker", "Motor Soft-Reboot (0x41) – Soll=Ist sync");
          id(can_bus)->send_data(${motor_can_id}, false, add_crc(${motor_can_id}, { 0x41 }));
      - delay: 2500ms   # Motor braucht ~2 s zum Hochfahren
      # Re-Init: Closed-Loop, 64 Steps, 2000 mA, Respond ON
      - lambda: |-
          std::vector<unsigned char> data;
          data = add_crc(${motor_can_id}, { 0x82, 0x04 });        // MODE: Closed Loop
          id(can_bus)->send_data(${motor_can_id}, false, data);
          data = add_crc(${motor_can_id}, { 0x84, 0x40 });        // MSTEP: 64 subdivisions
          id(can_bus)->send_data(${motor_can_id}, false, data);
          data = add_crc(${motor_can_id}, { 0x83, 0x07, 0xD0 });  // Work current: 2000 mA
          id(can_bus)->send_data(${motor_can_id}, false, data);
          data = add_crc(${motor_can_id}, { 0x9B, 0x00 });        // Idle current: min
          id(can_bus)->send_data(${motor_can_id}, false, data);
          data = add_crc(${motor_can_id}, { 0x8C, 0x01, 0x01 });  // Respond ON
          id(can_bus)->send_data(${motor_can_id}, false, data);
          ESP_LOGI("schwenker", "Motor Re-Init abgeschlossen");

  # ── System EIN ───────────────────────────────────────────
  - id: script_system_ein
    mode: single
    then:
      - lambda: |-
          id(system_ein) = true;
          lv_obj_set_style_bg_color(id(btn_system_power), lv_color_hex(0x229933), 0);
          auto call = id(climate_thermostat).make_call();
          call.set_mode("cool");
          call.perform();
          ESP_LOGI("system", "EIN");

  # ── System AUS ───────────────────────────────────────────
  - id: script_system_aus
    mode: single
    then:
      - lambda: |-
          id(system_ein) = false;
          lv_obj_set_style_bg_color(id(btn_system_power), lv_color_hex(0xAA2200), 0);
          id(script_schwenker_stop).execute();
          auto call = id(climate_thermostat).make_call();
          call.set_mode("off");
          call.perform();
          id(output_pumpe_dacA).turn_off();
          id(output_pumpe_dacB).turn_off();
          ESP_LOGI("system", "AUS");

# ============================================================
# 50 ms Takt – Sinus-Regelschleife
# ============================================================
interval:
  - interval: 50ms
    then:
      - lambda: |-
          // Winkelabfrage 20x/s – immer, auch wenn Schwenker inaktiv
          id(can_bus)->send_data(${motor_can_id}, false, add_crc(${motor_can_id}, { 0x30 }));

          if (!id(sw_aktiv)) return;

          // ── Phase vorwärts ────────────────────────────────────
          id(sw_phase_ms) += 50;

          float T     = (float)id(sw_halbperiode_ms);   // z.B. 3000.0 ms
          float phase = (float)id(sw_phase_ms) / T;     // 0.0 .. 1.0+

          // Sinus-Hüllkurve: 0 → 1 → 0 über eine Halbperiode
          float sin_val = sinf(M_PI * phase);
          if (sin_val < 0.0f) sin_val = 0.0f;

          int speed = (int)(id(sw_max_speed_rpm) * sin_val);
          // speed=0 ist OK – Motor stoppt dann sauber am Wendepunkt (laut Doku bestätigt)

          // ── "Fernes Ziel" berechnen ───────────────────────────
          // int24_t max = ±8.388.607. Wir nehmen ±8.000.000 als festes Target.
          // Bei 10 RPM und 50ms-Takt legt der Motor ~83 Schritte zurück → Target unerreichbar.
          const int32_t FAR_TARGET = 8000000;
          int32_t target = (int32_t)(id(sw_richtung)) * FAR_TARGET;

          // ── F5 CAN-Paket senden (Format laut offizieller Doku) ───
          // { 0xF5, spd_H, spd_L, acc, pos_HH, pos_H, pos_L } + CRC
          // acc 1–254: Motor interpoliert intern zwischen unseren Sinus-Stufen (kein Ruck)
          // acc 0/255: kein internes Ramping → jeder 50ms-Sprung wäre direkt spürbar
          uint8_t acc    = (uint8_t)id(sw_acc);
          uint8_t spd_h  = (uint8_t)(speed >> 8);
          uint8_t spd_l  = (uint8_t)(speed & 0xFF);
          uint32_t val   = (uint32_t)(target) & 0x00FFFFFFU;  // 24-Bit Two's Complement
          uint8_t p_hh   = (uint8_t)((val >> 16) & 0xFF);
          uint8_t p_h    = (uint8_t)((val >>  8) & 0xFF);
          uint8_t p_l    = (uint8_t)( val         & 0xFF);

          id(can_bus)->send_data(${motor_can_id}, false,
              add_crc(${motor_can_id}, { 0xF5, spd_h, spd_l, acc, p_hh, p_h, p_l }));

          ESP_LOGD("schwenker", "Dir:%+d  spd:%3d RPM  sin:%.3f  phase:%.3f  target:%d",
                   id(sw_richtung), speed, sin_val, phase, target);

          // ── Richtungswechsel am Periodenende ─────────────────
          if (id(sw_phase_ms) >= id(sw_halbperiode_ms)) {
            id(sw_richtung) *= -1;
            id(sw_phase_ms)  = 0;
            ESP_LOGI("schwenker", "Richtungswechsel → %+d", id(sw_richtung));
          }

# ============================================================
# Button – Start / Stop Toggle
# ============================================================
button:
  - platform: template
    name: "Schwenker Start/Stop"
    id: btn_schwenker_toggle
    on_press:
      - lambda: |-
          if (id(sw_aktiv)) {
            id(script_schwenker_stop).execute();
          } else {
            id(script_schwenker_start).execute();
          }


