<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Drehwurm - Preview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', 'Arial', sans-serif;
            background: linear-gradient(135deg, #e0e0e0 0%, #f5f5f5 100%);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        .controls button {
            padding: 10px 20px;
            background: #003366;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }

        .controls button:hover {
            background: #004488;
        }

        .controls button.active {
            background: #0055aa;
            box-shadow: 0 2px 8px rgba(0, 51, 102, 0.4);
        }

        .display-container {
            position: relative;
            width: 1024px;
            height: 600px;
            background: #fff;
            border: 10px solid #666;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #FFFFFF;
            display: none;
            flex-direction: column;
        }

        .page.active {
            display: flex;
        }

        /* Page 1: Hauptseite */
        .page-main .title {
            text-align: center;
            color: #003366;
            font-size: 60px;
            font-weight: bold;
            padding: 20px;
            margin-top: 0;
            text-shadow: 0 2px 4px rgba(0, 51, 102, 0.2);
        }

        .page-main .status-container {
            flex: 1;
            margin: 50px 62px;
            background: #F0F0F0;
            border: 2px solid #003366;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 10px rgba(0, 51, 102, 0.15);
        }

        .page-main .status-label {
            color: #000000;
            font-size: 28px;
        }

        .page-main .nav-button {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: #003366;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 5px;
            font-size: 28px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0, 51, 102, 0.3);
        }

        .page-main .nav-button:hover {
            background: #004488;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 51, 102, 0.4);
        }

        /* Page 2: Einstellungen */
        .page-settings .title {
            text-align: center;
            color: #003366;
            font-size: 60px;
            font-weight: bold;
            padding: 20px;
            margin-top: 0;
            text-shadow: 0 2px 4px rgba(0, 51, 102, 0.2);
        }

        .page-settings .config-container {
            flex: 1;
            margin: 50px 62px;
            background: #F0F0F0;
            border: 2px solid #003366;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 10px rgba(0, 51, 102, 0.15);
        }

        .page-settings .config-label {
            color: #000000;
            font-size: 28px;
        }

        .page-settings .back-button {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: #003366;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 5px;
            font-size: 28px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0, 51, 102, 0.3);
        }

        .page-settings .back-button:hover {
            background: #004488;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 51, 102, 0.4);
        }

        .info {
            margin-top: 20px;
            color: #003366;
            text-align: center;
            font-size: 14px;
        }

        .specs {
            background: rgba(240, 240, 240, 0.9);
            padding: 15px;
            border-radius: 5px;
            margin-top: 10px;
            border: 1px solid #003366;
        }

        .specs p {
            margin: 5px 0;
            color: #003366;
        }
    </style>
</head>
<body>
    <div class="controls">
        <button id="btnMain" class="active" onclick="showPage('main')">Hauptseite</button>
        <button id="btnSettings" onclick="showPage('settings')">Einstellungen</button>
    </div>

    <div class="display-container">
        <!-- Page 1: Hauptseite -->
        <div class="page page-main active" id="pageMain">
            <h1 class="title">Supercooler Drehwurm Kühler</h1>
            <div class="status-container">
                <div class="status-label">System bereit</div>
            </div>
            <button class="nav-button" onclick="showPage('settings')">⚙ Einstellungen</button>
        </div>

        <!-- Page 2: Einstellungen -->
        <div class="page page-settings" id="pageSettings">
            <h1 class="title">Einstellungen</h1>
            <div class="config-container">
                <div class="config-label">Konfigurationsoptionen folgen...</div>
            </div>
            <button class="back-button" onclick="showPage('main')">← Zurück</button>
        </div>
    </div>

    <div class="info">
        <div class="specs">
            <p><strong>Display Spezifikationen</strong></p>
            <p>Auflösung: 1024 x 600 Pixel</p>
            <p>Plattform: ESPHome + LVGL</p>
            <p>Farbtiefe: 16-bit (RGB565)</p>
        </div>
    </div>

    <script>
        function showPage(pageName) {
            // Alle Pages verstecken
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            
            // Alle Buttons zurücksetzen
            document.querySelectorAll('.controls button').forEach(btn => {
                btn.classList.remove('active');
            });

            // Gewählte Page anzeigen
            if (pageName === 'main') {
                document.getElementById('pageMain').classList.add('active');
                document.getElementById('btnMain').classList.add('active');
            } else if (pageName === 'settings') {
                document.getElementById('pageSettings').classList.add('active');
                document.getElementById('btnSettings').classList.add('active');
            }
        }

        // Initial Page laden
        showPage('main');
    </script>
</body>
</html>
