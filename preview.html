<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Drehwurm - Preview</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Roboto', Arial, sans-serif;
            background: #d0d0d0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .controls {
            margin-bottom: 16px;
            display: flex;
            gap: 10px;
        }
        .controls button {
            padding: 8px 20px;
            background: #003366;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 15px;
        }
        .controls button.active { background: #0055aa; }

        /* Display Rahmen */
        .display-container {
            position: relative;
            width: 1024px;
            height: 600px;
            background: #fff;
            border: 8px solid #555;
            border-radius: 8px;
            box-shadow: 0 16px 48px rgba(0,0,0,0.35);
            overflow: hidden;
        }

        /* Pages */
        .page {
            position: absolute;
            width: 100%; height: 100%;
            background: #FFFFFF;
            display: none;
        }
        .page.active { display: block; }

        /* ── PAGE 1: Hauptseite ── */
        #pageMain .p-title {
            text-align: center;
            color: #003366;
            font-size: 60px;
            font-weight: 700;
            padding: 18px 10px 10px;
        }
        #pageMain .squares {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, calc(-50% + 50px));
            display: flex;
            gap: 20px;
        }
        #pageMain .sq {
            width: 200px;
            height: 200px;
        }
        #pageMain .btn-settings {
            position: absolute;
            bottom: 20px; right: 20px;
            width: 200px; height: 60px;
            background: #003366;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 28px;
            font-family: 'Roboto', Arial, sans-serif;
            cursor: pointer;
        }
        #pageMain .btn-settings:hover { background: #004488; }

        /* ── PAGE 2: Einstellungen ── */
        #pageSettings .p-title {
            text-align: center;
            color: #003366;
            font-size: 60px;
            font-weight: 700;
            padding: 18px 10px 0;
        }

        /* TabView */
        .tabview {
            position: absolute;
            top: 100px; left: 0;
            width: 1024px; height: 490px;
        }
        .tab-bar {
            display: flex;
            height: 52px;
            background: #E0E0E0;
            border-bottom: 2px solid #bbb;
        }
        .tab-bar button {
            flex: 1;
            background: #E0E0E0;
            border: none;
            border-right: 1px solid #bbb;
            font-size: 30px;
            font-family: 'Roboto', Arial, sans-serif;
            font-weight: 400;
            color: #000;
            cursor: pointer;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            letter-spacing: 0.01em;
        }
        .tab-bar button:last-child { border-right: none; }
        .tab-bar button.active {
            background: #fff;
            font-weight: 700;
            border-bottom: 2px solid #fff;
            margin-bottom: -2px;
        }
        .tab-content {
            display: none;
            width: 100%;
            height: calc(100% - 52px);
            background: #fff;
            padding: 20px 32px;
        }
        .tab-content.active { display: block; }

        /* Tab Bildschirm: Helligkeit-Zeile */
        .row-helligkeit {
            display: flex;
            align-items: center;
            height: 70px;
            gap: 20px;
        }
        .row-helligkeit label {
            font-size: 28px;
            color: #000;
            white-space: nowrap;
            min-width: 180px;
        }
        .row-helligkeit input[type=range] {
            flex: 1;
            max-width: 650px;
            height: 20px;
            accent-color: #003366;
        }

        /* Tab Platzhalter */
        .tab-placeholder {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #000;
        }

        /* Zurück Button */
        #pageSettings .btn-back {
            position: absolute;
            bottom: 20px; left: 20px;
            width: 200px; height: 60px;
            background: #444444;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 28px;
            font-family: 'Roboto', Arial, sans-serif;
            cursor: pointer;
        }
        #pageSettings .btn-back:hover { background: #555; }

        /* Specs */
        .info {
            margin-top: 16px;
            font-size: 13px;
            color: #333;
            background: #eee;
            border: 1px solid #aaa;
            border-radius: 5px;
            padding: 10px 20px;
        }
        .info p { margin: 3px 0; }
    </style>
</head>
<body>

<div class="controls">
    <button id="btnMain" class="active" onclick="showPage('main')">Hauptseite</button>
    <button id="btnSettings" onclick="showPage('settings')">Einstellungen</button>
</div>

<div class="display-container">

    <!-- PAGE 1: Hauptseite -->
    <div class="page active" id="pageMain">
        <div class="p-title">Supercooler Drehwurm Kühler</div>
        <div class="squares">
                <div class="sq" style="background:#FF0000"></div>
                <div class="sq" style="background:#00FF00"></div>
                <div class="sq" style="background:#0000FF"></div>
            </div>
        <button class="btn-settings" onclick="showPage('settings')">Einstellungen</button>
    </div>

    <!-- PAGE 2: Einstellungen -->
    <div class="page" id="pageSettings">
        <div class="p-title">Einstellungen</div>

        <div class="tabview">
            <div class="tab-bar">
                <button class="active" onclick="showTab('bildschirm', this)">Bildschirm</button>
                <button onclick="showTab('system', this)">System</button>
                <button onclick="showTab('kuehler', this)">Kühler</button>
            </div>

            <!-- Tab: Bildschirm -->
            <div class="tab-content active" id="tab-bildschirm">
                <div class="row-helligkeit">
                    <label>Helligkeit</label>
                    <input type="range" min="0" max="100" value="80">
                </div>
            </div>

            <!-- Tab: System -->
            <div class="tab-content" id="tab-system">
                <div class="tab-placeholder">System-Einstellungen folgen...</div>
            </div>

            <!-- Tab: Kühler -->
            <div class="tab-content" id="tab-kuehler">
                <div class="tab-placeholder">Kühler-Einstellungen folgen...</div>
            </div>
        </div>

        <button class="btn-back" onclick="showPage('main')">Zurück</button>
    </div>

</div>

<div class="info">
    <p><strong>Display:</strong> 1024 × 600 px &nbsp;|&nbsp; ESPHome + LVGL &nbsp;|&nbsp; 16-bit RGB565</p>
</div>

<script>
    function showPage(name) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
        if (name === 'main') {
            document.getElementById('pageMain').classList.add('active');
            document.getElementById('btnMain').classList.add('active');
        } else {
            document.getElementById('pageSettings').classList.add('active');
            document.getElementById('btnSettings').classList.add('active');
        }
    }

    function showTab(name, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + name).classList.add('active');
        btn.classList.add('active');
    }
</script>
</body>
</html>
