<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Drehwurm - Preview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', 'Arial', sans-serif;
            background: linear-gradient(135deg, #0a1929 0%, #001428 100%);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        .controls button {
            padding: 10px 20px;
            background: #00A8E8;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }

        .controls button:hover {
            background: #0086b8;
        }

        .controls button.active {
            background: #00FFD4;
            color: #001428;
        }

        .display-container {
            position: relative;
            width: 1024px;
            height: 600px;
            background: #000;
            border: 10px solid #333;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #001428;
            display: none;
            flex-direction: column;
        }

        .page.active {
            display: flex;
        }

        /* Page 1: Hauptseite */
        .page-main .title {
            text-align: center;
            color: #00FFD4;
            font-size: 60px;
            font-weight: bold;
            padding: 20px;
            margin-top: 0;
            text-shadow: 0 0 20px rgba(0, 255, 212, 0.5);
        }

        .page-main .status-container {
            flex: 1;
            margin: 50px 62px;
            background: #002850;
            border: 2px solid #00A8E8;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0, 168, 232, 0.3);
        }

        .page-main .status-label {
            color: white;
            font-size: 28px;
        }

        .page-main .nav-button {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: #00A8E8;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 5px;
            font-size: 28px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 168, 232, 0.4);
        }

        .page-main .nav-button:hover {
            background: #00FFD4;
            color: #001428;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 255, 212, 0.6);
        }

        /* Page 2: Einstellungen */
        .page-settings .title {
            text-align: center;
            color: #00FFD4;
            font-size: 60px;
            font-weight: bold;
            padding: 20px;
            margin-top: 0;
            text-shadow: 0 0 20px rgba(0, 255, 212, 0.5);
        }

        .page-settings .config-container {
            flex: 1;
            margin: 50px 62px;
            background: #002850;
            border: 2px solid #00A8E8;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0, 168, 232, 0.3);
        }

        .page-settings .config-label {
            color: white;
            font-size: 28px;
        }

        .page-settings .back-button {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: #00A8E8;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 5px;
            font-size: 28px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 168, 232, 0.4);
        }

        .page-settings .back-button:hover {
            background: #00FFD4;
            color: #001428;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 255, 212, 0.6);
        }

        .info {
            margin-top: 20px;
            color: #00FFD4;
            text-align: center;
            font-size: 14px;
        }

        .specs {
            background: rgba(0, 20, 40, 0.8);
            padding: 15px;
            border-radius: 5px;
            margin-top: 10px;
            border: 1px solid #00A8E8;
        }

        .specs p {
            margin: 5px 0;
            color: #00A8E8;
        }
    </style>
</head>
<body>
    <div class="controls">
        <button id="btnMain" class="active" onclick="showPage('main')">Hauptseite</button>
        <button id="btnSettings" onclick="showPage('settings')">Einstellungen</button>
    </div>

    <div class="display-container">
        <!-- Page 1: Hauptseite -->
        <div class="page page-main active" id="pageMain">
            <h1 class="title">Supercooler Drehwurm Kühler</h1>
            <div class="status-container">
                <div class="status-label">System bereit</div>
            </div>
            <button class="nav-button" onclick="showPage('settings')">⚙ Einstellungen</button>
        </div>

        <!-- Page 2: Einstellungen -->
        <div class="page page-settings" id="pageSettings">
            <h1 class="title">Einstellungen</h1>
            <div class="config-container">
                <div class="config-label">Konfigurationsoptionen folgen...</div>
            </div>
            <button class="back-button" onclick="showPage('main')">← Zurück</button>
        </div>
    </div>

    <div class="info">
        <div class="specs">
            <p><strong>Display Spezifikationen</strong></p>
            <p>Auflösung: 1024 x 600 Pixel</p>
            <p>Plattform: ESPHome + LVGL</p>
            <p>Farbtiefe: 16-bit (RGB565)</p>
        </div>
    </div>

    <script>
        function showPage(pageName) {
            // Alle Pages verstecken
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            
            // Alle Buttons zurücksetzen
            document.querySelectorAll('.controls button').forEach(btn => {
                btn.classList.remove('active');
            });

            // Gewählte Page anzeigen
            if (pageName === 'main') {
                document.getElementById('pageMain').classList.add('active');
                document.getElementById('btnMain').classList.add('active');
            } else if (pageName === 'settings') {
                document.getElementById('pageSettings').classList.add('active');
                document.getElementById('btnSettings').classList.add('active');
            }
        }

        // Initial Page laden
        showPage('main');
    </script>
</body>
</html>
